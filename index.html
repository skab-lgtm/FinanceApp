<script>

// Empty defaults — real data comes from Gist sync
var H=[];var A=[];var RE=[];var O=[];var DV={};var B={income:0,spent:0,items:{}};var ux=1.355;var lr="";var arTimer=null;var curTab="summary";var sortK="vc";var sortD="desc";var editI=-1;var ghToken="";var gistId="";var gmailToken="";var gmailClientId="";var pendingTrades=[];var txnLog=[];var auditLog=[];var expanded={};var uid=function(){return Date.now().toString(36)+Math.random().toString(36).substr(2)};var GJ=function(k){try{var v=localStorage.getItem(k);return v?JSON.parse(v):null}catch(e){return null}};var SJ=function(k,v){localStorage.setItem(k,JSON.stringify(v))};function load(){
  H=GJ("H")||[];
  A=GJ("A")||[];
  RE=GJ("RE")||[];
  O=GJ("O")||[];
  DV=GJ("DV")||{};
  B=GJ("B")||{income:0,spent:0,items:{}};
  ux=GJ("ux")||1.355;
  lr=GJ("lr")||"";
  ghToken=GJ("ghToken")||"";
  gistId=GJ("gistId")||"";
  gmailToken=GJ("gmailToken")||"";
  gmailClientId=GJ("gmailCid")||"";
  pendingTrades=GJ("pendingTrades")||[];
  txnLog=GJ("txnLog")||[];
  auditLog=GJ("auditLog")||[];
  expanded=GJ("expanded")||{};
  
  // MIGRATION: Convert old H array to transaction log if txnLog is empty
  if(txnLog.length===0 && H.length>0){
    for(var i=0;i<H.length;i++){
      var h=H[i];
      // Create initial transaction for each holding
      txnLog.push({
        id:uid(),
        date:new Date().toISOString(),
        sym:h.s,
        action:"Buy",
        shares:h.n,
        price:h.c,
        acct:h.a,
        source:"migration",
        msgId:""
      });
    }
    save();
    toast("Migrated "+H.length+" holdings to transaction log");
  }
}function save(){SJ("H",H);SJ("A",A);SJ("RE",RE);SJ("O",O);SJ("DV",DV);SJ("B",B);SJ("ux",ux);SJ("lr",lr);SJ("pendingTrades",pendingTrades);SJ("txnLog",txnLog);SJ("auditLog",auditLog);SJ("expanded",expanded)}load();function getAllData(){return{H:H,A:A,RE:RE,O:O,DV:DV,B:B,ux:ux,lr:lr,pendingTrades:pendingTrades,txnLog:txnLog,auditLog:auditLog}}function applyData(d){H=d.H||[];A=d.A||[];RE=d.RE||[];O=d.O||[];DV=d.DV||{};B=d.B||{income:0,spent:0,items:{}};ux=d.ux||1.355;lr=d.lr||"";pendingTrades=d.pendingTrades||[];txnLog=d.txnLog||[];auditLog=d.auditLog||[]}function syncToGist(){if(!ghToken){toast("Set GitHub token first");return Promise.resolve()}var data=getAllData();var body=JSON.stringify({description:"Financial Command Center Data",public:false,files:{"finance_data.json":{content:JSON.stringify(data,null,2)}}});var url=gistId?"https://api.github.com/gists/"+gistId:"https://api.github.com/gists";var method=gistId?"PATCH":"POST";return fetch(url,{method:method,headers:{Authorization:"token "+ghToken,"Content-Type":"application/json"},body:body}).then(function(r){return r.json()}).then(function(j){if(j.id&&!gistId){gistId=j.id;SJ("gistId",gistId)}toast("Synced to Gist")}).catch(function(e){toast("Gist sync failed")})}function pullFromGist(){if(!ghToken||!gistId){return Promise.resolve(false)}return fetch("https://api.github.com/gists/"+gistId,{headers:{Authorization:"token "+ghToken}}).then(function(r){return r.json()}).then(function(j){var c=j.files["finance_data.json"].content;applyData(JSON.parse(c));save();return true}).catch(function(e){return false})}function scanGmail(){if(!gmailToken){toast("Connect Gmail first");return}toast("Scanning...");fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages?q=from:help@wealthsimple.com+subject:order+filled",{headers:{Authorization:"Bearer "+gmailToken}}).then(function(r){return r.json()}).then(function(j){if(!j.messages){toast("No emails");return Promise.resolve()}var found=0;var promises=[];for(var i=0;i<j.messages.length;i++){(function(mid){promises.push(fetch("https://gmail.googleapis.com/gmail/v1/users/me/messages/"+mid,{headers:{Authorization:"Bearer "+gmailToken}}).then(function(mr){return mr.json()}).then(function(mj){var snip=mj.snippet||"";var m=snip.match(/bought (\d+(?:\.\d+)?) (.+?) (?:share|shares) .*?(\d+\.\d+)/i)||snip.match(/sold (\d+(?:\.\d+)?) (.+?) (?:share|shares) .*?(\d+\.\d+)/i);if(m){var exists=pendingTrades.some(function(t){return t.msgId===mid});if(!exists){var shares=Number(m[1]),sym=m[2].toUpperCase().replace(/\s+/g,""),price=Number(m[3]),action=snip.match(/bought/i)?"Buy":"Sell";pendingTrades.push({symbol:sym,action:action,shares:shares,price:price,total:shares*price,account:"WealthSimple",acctId:"",date:new Date().toISOString(),msgId:mid});found++}}}))})(j.messages[i].id)}return Promise.all(promises).then(function(){save();toast(found+" new trade(s)");rTr();initNav()})}).catch(function(e){toast("Scan failed")})}function gmailAuth(){if(!gmailClientId){toast("Enter Client ID");return}var redir=encodeURIComponent(window.location.origin+window.location.pathname);var url="https://accounts.google.com/o/oauth2/v2/auth?client_id="+gmailClientId+"&redirect_uri="+redir+"&response_type=token&scope=https://www.googleapis.com/auth/gmail.readonly";window.location.href=url}function checkGmailCallback(){var h=window.location.hash;if(h.indexOf("access_token")>=0){var m=h.match(/access_token=([^&]+)/);if(m){gmailToken=m[1];SJ("gmailToken",gmailToken);toast("Gmail connected!");window.location.hash=""}}}function toggleTheme(){var t=document.documentElement.dataset.theme==="dark"?"light":"dark";document.documentElement.dataset.theme=t;localStorage.setItem("theme",t)}if(localStorage.getItem("theme"))document.documentElement.dataset.theme=localStorage.getItem("theme");function toast(m){var tc=document.getElementById("tc");var t=document.createElement("div");t.className="to fi";t.textContent=m;tc.appendChild(t);setTimeout(function(){t.style.opacity="0";setTimeout(function(){tc.removeChild(t)},300)},2000)}function F(n,d){if(d===void 0)d=2;return n.toLocaleString("en-US",{minimumFractionDigits:d,maximumFractionDigits:d})}function FP(n){return(n*100>=0?"+":"")+F(n*100,2)+"%"}function esc(s){return s.replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}function acOpts(){var s="";for(var i=0;i<A.length;i++)s+='<option value="'+esc(A[i].id)+'">'+esc(A[i].l||A[i].id)+"</option>";return s}function tpc(t){if(t==="RRSP"||t==="RESP")return"var(--pu)";if(t==="TFSA"||t==="FHSA")return"var(--ac)";if(t==="Non-Reg")return"var(--gl)";return"var(--bl)"}function kco(k){if(k==="Growth")return"var(--gn)";if(k==="Dividend")return"var(--bl)";return"var(--pu)"}function pcl(v){return v>=0?"gv":"rv"}function plc(v){return v>=0?"var(--gn)":"var(--rd)"}

// ═══ TRANSACTION LOG ═══
function addTxn(sym,action,shares,price,acct,src,msgId){
  var tx={id:uid(),date:new Date().toISOString(),sym:sym,action:action,shares:shares,price:price,acct:acct,source:src||"manual",msgId:msgId||""};
  txnLog.push(tx);
  save();
}

// Get all transactions for a symbol+account pair
function getTxns(sym,acct){
  return txnLog.filter(function(t){return t.sym===sym&&t.acct===acct}).sort(function(a,b){return new Date(b.date)-new Date(a.date)});
}

// ═══ AUDIT LOG ═══
function auditAdd(type,data){auditLog.push({id:uid(),date:new Date().toISOString(),type:type,data:JSON.parse(JSON.stringify(data))});if(auditLog.length>200)auditLog=auditLog.slice(-200);save()}

// ═══ CALC ═══
// UPDATED: Build holdings from transaction log instead of H array
function calc(){
  // Group transactions by symbol+account to build holdings
  var holdingMap = {};
  
  for(var i=0;i<txnLog.length;i++){
    var tx = txnLog[i];
    var key = tx.sym + "|" + tx.acct;
    
    if(!holdingMap[key]){
      holdingMap[key] = {
        s: tx.sym,
        t: "C", // Default to CAD, will be updated
        c: 0,
        n: 0,
        a: tx.acct,
        k: "ETF", // Default type
        p: 0
      };
    }
    
    var h = holdingMap[key];
    
    if(tx.action === "Buy"){
      // Add to position
      var newQty = h.n + tx.shares;
      var newCost = newQty > 0 ? ((h.c * h.n) + (tx.price * tx.shares)) / newQty : tx.price;
      h.n = newQty;
      h.c = newCost;
      h.p = tx.price; // Update last price
    } else if(tx.action === "Sell"){
      // Reduce position
      h.n = Math.max(0, h.n - tx.shares);
    }
  }
  
  // Merge with existing H array for metadata (type, currency)
  for(var j=0;j<H.length;j++){
    var key2 = H[j].s + "|" + H[j].a;
    if(holdingMap[key2]){
      holdingMap[key2].t = H[j].t;
      holdingMap[key2].k = H[j].k;
      if(H[j].p) holdingMap[key2].p = H[j].p;
    }
  }
  
  // Convert to array
  var holdings = [];
  var keys = Object.keys(holdingMap);
  for(var k=0;k<keys.length;k++){
    var hld = holdingMap[keys[k]];
    if(hld.n > 0){ // Only include positions with shares
      holdings.push(hld);
    }
  }
  
  // Calculate values
  var R=[],i,j;
  for(i=0;i<holdings.length;i++){
    var h=holdings[i],r=h.t==="U"?ux:1,lp=h.p||h.c,cc=h.c*h.n*r,vc=lp*h.n*r;
    R.push({s:h.s,t:h.t,c:h.c,n:h.n,a:h.a,k:h.k,p:h.p,lp:lp,cc:cc,vc:vc,d:vc-cc,pc:cc?(vc-cc)/cc:0,_i:i})
  }
  
  var tC=0,tV=0;
  for(i=0;i<R.length;i++){tC+=R[i].cc;tV+=R[i].vc}
  
  var byT={};
  for(i=0;i<A.length;i++){
    var ac=A[i];
    if(!byT[ac.tp])byT[ac.tp]={h:0,co:0,ca:0,n:0};
    byT[ac.tp].ca+=(ac.cc||0)+(ac.cu||0)*ux
  }
  
  for(i=0;i<R.length;i++){
    var tp="Other";
    for(j=0;j<A.length;j++){
      if(A[j].id===R[i].a){tp=A[j].tp;break}
    }
    if(!byT[tp])byT[tp]={h:0,co:0,ca:0,n:0};
    byT[tp].h+=R[i].vc;
    byT[tp].co+=R[i].cc;
    byT[tp].n++
  }
  
  var cash=0;
  for(i=0;i<A.length;i++)cash+=(A[i].cc||0)+(A[i].cu||0)*ux;
  
  var oT=0;
  for(i=0;i<O.length;i++)oT+=O[i].a;
  
  var rspV=0,rspC=0;
  for(i=0;i<RE.length;i++){
    var rlp=RE[i].p||RE[i].c;
    rspV+=rlp*RE[i].n;
    rspC+=RE[i].c*RE[i].n
  }
  
  if(!byT["RESP"])byT["RESP"]={h:0,co:0,ca:0,n:0};
  byT["RESP"].h+=rspV;
  byT["RESP"].co+=rspC;
  byT["RESP"].n+=RE.length;
  
  var annD=0;
  for(i=0;i<R.length;i++){
    var dv=DV[R[i].s]||0;
    if(dv)annD+=dv*4*R[i].n*(R[i].t==="U"?ux:1)
  }
  
  var W=R.slice().sort(function(a,b){return b.pc-a.pc}).slice(0,5);
  var L=R.slice().sort(function(a,b){return a.pc-b.pc}).slice(0,5);
  
  return{R:R,tC:tC,tV:tV,tP:tV-tC,byT:byT,cash:cash,oT:oT,rspV:rspV,rspC:rspC,grand:tV+cash+oT+rspV,annD:annD,W:W,L:L,cnt:R.length}
}

// ═══ NAV ═══

function toggleExpanded(sym,acct){
  var key = sym+"_"+acct;
  expanded[key] = !expanded[key];
  save();
  rPTable();
}

function srt(k){if(sortK===k)sortD=sortD==="asc"?"desc":"asc";else{sortK=k;sortD="desc"}rPTable()}

function addTrade(){
  var s=(document.getElementById("ts").value||"").trim().toUpperCase(),
      t=document.getElementById("tt").value,
      c=parseFloat(document.getElementById("tc2").value),
      n=parseFloat(document.getElementById("tn").value),
      a=document.getElementById("ta").value,
      k=document.getElementById("tk").value;
  
  if(!s||!c||!n){toast("Fill all fields");return}
  
  // Add transaction to log
  addTxn(s,"Buy",n,c,a,"portfolio");
  
  // Update H array metadata if this symbol+account doesn't exist
  var exists = false;
  for(var i=0;i<H.length;i++){
    if(H[i].s===s && H[i].a===a){
      exists = true;
      H[i].t = t;
      H[i].k = k;
      break;
    }
  }
  
  if(!exists){
    H.push({s:s,t:t,c:c,n:n,a:a,k:k,p:c});
  }
  
  save();
  toast("Added "+s);
  rP();
  rS();
}

function editHolding(sym,acct){
  // Find in H array
  for(var i=0;i<H.length;i++){
    if(H[i].s===sym && H[i].a===acct){
      editI=i;
      rPTable();
      return;
    }
  }
}

function removeHolding(sym,acct){
  if(!confirm("Remove "+sym+" from "+acct+"?\n\nThis will delete ALL transactions for this holding."))return;
  
  // Remove all transactions
  var txns = getTxns(sym,acct);
  for(var i=0;i<txns.length;i++){
    auditAdd("txn",txns[i]);
  }
  txnLog = txnLog.filter(function(t){return !(t.sym===sym && t.acct===acct)});
  
  // Remove from H array
  for(var j=H.length-1;j>=0;j--){
    if(H[j].s===sym && H[j].a===acct){
      auditAdd("holding",H[j]);
      H.splice(j,1);
    }
  }
  
  save();
  toast("Removed "+sym);
  editI=-1;
  rPTable();
  rS();
}

function removeTxn(txnId,sym,acct){
  if(!confirm("Remove this transaction?"))return;
  
  var ti=-1;
  for(var i=0;i<txnLog.length;i++){
    if(txnLog[i].id===txnId){
      ti=i;
      break;
    }
  }
  
  if(ti<0)return;
  
  var tx=txnLog[ti];
  auditAdd("txn",tx);
  txnLog.splice(ti,1);
  save();
  toast("Transaction removed");
  rPTable();
  rS();
}

function saveEdit(i){
  if(i<0 || i>=H.length)return;
  
  H[i]={
    s:(document.getElementById("es").value||"").trim().toUpperCase(),
    t:document.getElementById("et").value,
    c:parseFloat(document.getElementById("ec").value)||0,
    n:parseFloat(document.getElementById("en").value)||0,
    p:parseFloat(document.getElementById("ep").value)||H[i].p,
    a:document.getElementById("ea").value,
    k:document.getElementById("ek").value
  };
  
  editI=-1;
  save();
  toast("Saved");
  rPTable();
  rS();
}

// ═══ TRADE APPROVAL ═══
function approveTrade(idx){
  var tr=pendingTrades[idx];
  if(!tr)return;
  
  // Add transaction to log
  addTxn(tr.symbol,tr.action,tr.shares,tr.price,tr.acctId,"trades",tr.msgId);
  
  // Update H array metadata if needed
  var exists = false;
  for(var i=0;i<H.length;i++){
    if(H[i].s===tr.symbol && H[i].a===tr.acctId){
      exists = true;
      break;
    }
  }
  
  if(!exists){
    H.push({s:tr.symbol,t:"C",c:tr.price,n:tr.shares,a:tr.acctId,k:"ETF",p:tr.price});
  }
  
  pendingTrades.splice(idx,1);
  save();
  toast(tr.action+" "+tr.shares+" "+tr.symbol);
  rTr();
  rS();
}

function skipTrade(idx){auditAdd("skipped_trade",pendingTrades[idx]);pendingTrades.splice(idx,1);save();rTr()}
function editPendingTrade(idx){var tr=pendingTrades[idx];var sym=prompt("Symbol:",tr.symbol);if(!sym)return;var shares=Number(prompt("Shares:",tr.shares));if(!shares)return;var price=Number(prompt("Price:",tr.price));if(!price)return;var acctId=prompt("Account ID:",tr.acctId)||tr.acctId;pendingTrades[idx]={symbol:sym.toUpperCase(),shares:shares,price:price,total:shares*price,acctId:acctId,account:tr.account,date:tr.date,msgId:tr.msgId,action:tr.action};save();rTr()}

  document.getElementById("t-trades").innerHTML=h}

function addBudgetItem(){var n=prompt("Name:");if(!n)return;var a=Number(prompt("Amount:"));if(!a)return;B.items[n]=a;save();rB()}
function rmBudgetItem(k){auditAdd("budget",{name:k,amt:B.items[k]});delete B.items[k];save();rB()}

  var c=calc();
  var h='<div class="c" style="margin-bottom:8px"><div class="lb">Annual Dividend Income</div><div class="mn vl gv">$'+F(c.annD,0)+' / yr</div><div class="sl">$'+F(c.annD/12,0)+' / mo · $'+F(c.annD/365,2)+" / day</div></div>";

  h+='<div class="fg"><label class="fl">Q Div</label><input id="dvv" type="number" step="0.01"></div>';

function addDiv(){var s=(document.getElementById("dvs").value||"").trim().toUpperCase(),v=parseFloat(document.getElementById("dvv").value);if(!s||!v){toast("Fill all");return}DV[s]=v;save();rD();rS()}

// ═══ OTHER ═══
function rO(){var h='<div class="c" style="margin-bottom:8px"><div class="lb">Add Other Investment</div><div style="display:grid;grid-template-columns:1fr 1fr auto;gap:4px;align-items:end"><div class="fg"><label class="fl">Name</label><input id="on" placeholder="Property"></div><div class="fg"><label class="fl">Amount</label><input id="oa" type="number"></div><button class="b bp" onclick="addOther()">+</button></div></div>';h+='<div class="tw"><table><thead><tr><th>Name</th><th>Amount</th><th>Actions</th></tr></thead><tbody>';for(var i=0;i<O.length;i++){var o=O[i];h+="<tr><td>"+esc(o.n)+"</td><td class='mn'>$"+F(o.a,0)+"</td><td><button class='b bs br' onclick='rmOther("+i+")'>×</button></td></tr>"}h+="</tbody></table></div>";document.getElementById("t-other").innerHTML=h}

function rmOther(i){auditAdd("other_inv",O[i]);O.splice(i,1);save();rO();rS()}

// ═══ ACCOUNTS ═══
function rA(){var h='<div class="c" style="margin-bottom:8px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px"><div class="lb">Accounts</div><button class="b bp bs" onclick="addAcct()">+ Add</button></div>';for(var i=0;i<A.length;i++){var a=A[i];h+='<div class="ar"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px"><div><div style="font-weight:600;font-size:12px">'+esc(a.l||a.id)+'</div><div class="sl">'+esc(a.b||"")+" · "+esc(a.tp||"")+" · "+esc(a.o||"")+'</div></div><button class="b bs br" onclick="rmAcct('+i+')">×</button></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:4px"><div class="bi"><label>CAD Cash</label><input type="number" value="'+(a.cc||0)+'" onchange="A['+i+'].cc=Number(this.value);save();rA();rS()"></div><div class="bi"><label>USD Cash</label><input type="number" value="'+(a.cu||0)+'" onchange="A['+i+'].cu=Number(this.value);save();rA();rS()"></div></div></div>'}h+="</div>";document.getElementById("t-accounts").innerHTML=h}
function addAcct(){var id=prompt("Account ID (e.g. SK FHSA WS):");if(!id||!id.trim())return;id=id.trim();for(var i=0;i<A.length;i++){if(A[i].id===id){toast("ID already exists");return}}var label=prompt("Display label (e.g. Syed FHSA — WS):");var broker=prompt("Broker (RBC / WealthSimple / Questrade):");var tp=prompt("Type (RRSP / TFSA / RESP / FHSA / Non-Reg):");var owner=prompt("Owner (Syed / Shazia / Joint):");A.push({id:id,l:label||id,b:broker||"",tp:tp||"RRSP",o:owner||"Syed",cc:0,cu:0});save();rA();rS();toast("Account added!")}
function rmAcct(i){auditAdd("account",A[i]);A.splice(i,1);save();rA();rS()}

// ═══ AUDIT ═══
function rAudit(){
  var h='<div class="c"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-size:13px;font-weight:600">Audit Log — Deleted Items</div>';
  if(auditLog.length)h+='<button class="b bs br" onclick="if(confirm(\'Clear entire audit log?\')){auditLog=[];save();rAudit()}">Clear All</button>';
  h+="</div>";
  if(!auditLog.length){h+='<div style="text-align:center;padding:20px;color:var(--mt)"><div style="font-size:20px;margin-bottom:4px">📜</div><div style="font-size:12px">No deleted items. Anything you remove from any tab appears here for restore.</div></div>'}
  else{for(var i=auditLog.length-1;i>=0;i--){var a=auditLog[i];var desc="";if(a.type==="holding")desc="Holding: "+a.data.s+" ("+a.data.n+" shares @ $"+F(a.data.c)+")";else if(a.type==="resp_holding")desc="RESP: "+a.data.s+" ("+a.data.n+" shares)";else if(a.type==="account")desc="Account: "+a.data.l+" ("+a.data.tp+")";else if(a.type==="other_inv")desc="Other: "+a.data.n+" ($"+F(a.data.a,0)+")";else if(a.type==="budget")desc="Budget: "+a.data.name+" ($"+F(a.data.amt,0)+")";else if(a.type==="txn")desc="Txn: "+a.data.action+" "+a.data.shares+" "+a.data.sym;else if(a.type==="skipped_trade")desc="Skipped: "+a.data.action+" "+a.data.shares+" "+a.data.symbol;else desc=a.type+": "+JSON.stringify(a.data).substring(0,60);
  h+='<div class="sr"><div><span style="font-size:11px;font-weight:600">'+esc(desc)+'</span><div class="sl">'+new Date(a.date).toLocaleString()+'</div></div><button class="b bp bs" onclick="restoreAudit('+i+')">↺ Restore</button></div>'}}
  h+="</div>";document.getElementById("t-audit").innerHTML=h}

function restoreAudit(idx){
  var a=auditLog[idx];
  if(a.type==="holding"){H.push(a.data);toast("Restored "+a.data.s)}
  else if(a.type==="resp_holding"){RE.push(a.data);toast("Restored "+a.data.s)}
  else if(a.type==="account"){A.push(a.data);toast("Restored "+a.data.l)}
  else if(a.type==="other_inv"){O.push(a.data);toast("Restored "+a.data.n)}
  else if(a.type==="budget"){B.items[a.data.name]=a.data.amt;toast("Restored "+a.data.name)}
  else if(a.type==="txn"){txnLog.push(a.data);toast("Restored txn")}
  else{toast("Restored");return}
  auditLog.splice(idx,1);save();rAudit();rS()}

// ═══ SETTINGS ═══
function rSet(){
  var gcidMasked=gmailClientId?gmailClientId.substring(0,12)+"...":"";
  var h='<div class="c" style="margin-bottom:8px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">☁️ GitHub Gist Sync</div><div class="sl" style="line-height:1.5;margin-bottom:6px">Syncs all data across devices via private Gist.</div><div class="fg"><label class="fl">GitHub Token</label><div style="display:flex;gap:4px"><input id="ght" type="password" value="'+esc(ghToken)+'" placeholder="ghp_xxxx" style="flex:1"><button class="b bp bs" onclick="ghToken=document.getElementById(\'ght\').value.trim();SJ(\'ghToken\',ghToken);var gid=document.getElementById(\'gid\').value.trim();if(gid){gistId=gid;SJ(\'gistId\',gistId);pullFromGist().then(function(ok){if(ok){toast(\'Synced!\');setTimeout(function(){location.reload()},500)}else toast(\'Failed\')})}else syncToGist().then(function(){toast(\'Connected!\')})">Connect</button></div></div><div class="fg"><label class="fl">Gist ID</label><input id="gid" value="'+esc(gistId)+'" placeholder="Auto-created" style="font-size:9px"></div><div style="display:flex;gap:4px;margin-top:4px"><button class="b bs" onclick="pullFromGist().then(function(ok){if(ok){toast(\'Pulled!\');setTimeout(function(){location.reload()},500)}else toast(\'Failed\')})">↓ Pull</button><button class="b bs" onclick="syncToGist();toast(\'Pushed\')">↑ Push</button></div></div>';
  h+='<div class="c" style="margin-bottom:8px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">📨 Gmail Integration</div><div class="sl" style="margin-bottom:6px">Reads WealthSimple trade emails (read-only).</div><div class="fg"><label class="fl">Google OAuth Client ID</label><div style="display:flex;gap:4px"><input id="gcid" type="password" value="'+esc(gmailClientId)+'" placeholder="Paste Client ID" style="flex:1"><button class="b bp bs" onclick="gmailClientId=document.getElementById(\'gcid\').value.trim();SJ(\'gmailCid\',gmailClientId);gmailAuth()">Connect Gmail</button></div></div>'+(gmailToken?'<div class="sl" style="margin-top:3px;color:var(--gn)">✓ Connected</div>':'<div class="sl" style="margin-top:3px;color:var(--gl)">Not connected</div>')+"</div>";
  h+='<div class="c" style="margin-bottom:8px"><div style="font-size:13px;font-weight:600;margin-bottom:6px">🔄 Prices</div><div style="display:flex;gap:4px;margin-bottom:4px"><button class="b bp" onclick="refreshPrices()" id="rbtn">⟳ Refresh</button><button class="b" onclick="toggleAR()" id="arb">▶ Auto 60s</button></div><div id="ps" class="sl"></div><div class="pr"><div class="pf" id="pp" style="width:0%;background:var(--ac)"></div></div>'+(lr?'<div class="sl" style="margin-top:3px">Last: '+new Date(lr).toLocaleString()+'</div>':'')+'<div class="fg" style="margin-top:6px"><label class="fl">USD/CAD</label><input type="number" step="0.00001" value="'+ux+'" onchange="ux=Number(this.value);save();rS()" style="width:110px" class="mn"></div></div>';
  h+='<div class="c" style="margin-bottom:8px"><div style="font-size:13px;font-weight:600;margin-bottom:4px">🎨 Theme</div><div style="display:flex;align-items:center;gap:8px"><span style="font-size:11px">🌙 Dark</span><button class="tt" onclick="toggleTheme()"></button><span style="font-size:11px">☀️ Light</span></div></div>';
  h+='<div class="c" style="margin-bottom:8px"><div style="font-size:13px;font-weight:600;margin-bottom:4px">📁 Data</div><div style="display:flex;gap:4px;flex-wrap:wrap"><button class="b" onclick="expJSON()">↓ JSON</button><button class="b" onclick="impJSON()">↑ Import</button><button class="b" onclick="expCSV()">↓ CSV</button><button class="b br" onclick="if(confirm(\'Reset ALL?\')){localStorage.clear();location.reload()}">⚠ Reset</button></div></div>';
  h+='<div class="c"><div style="font-size:13px;font-weight:600;margin-bottom:3px">📱 iPhone</div><div class="sl">Safari → Share → Add to Home Screen</div></div>';
  document.getElementById("t-settings").innerHTML=h}

// ═══ PRICES ═══
function refreshPrices(){var btn=document.getElementById("rbtn");if(btn){btn.disabled=true;btn.textContent="⟳ ..."}var syms={};var c=calc();for(var i=0;i<c.R.length;i++){var s=c.R[i].s.replace(".TO","");syms[c.R[i].t==="U"?s:s+".TO"]=1}for(i=0;i<RE.length;i++){syms[RE[i].s+".TO"]=1}syms["CADUSD=X"]=1;var list=Object.keys(syms);var done=0,ok=0,fail=0;var pp=document.getElementById("pp"),ps=document.getElementById("ps");if(ps)ps.textContent="Fetching "+list.length+"...";var allPromises=[];for(var b=0;b<list.length;b+=5){var batch=list.slice(b,b+5);for(var bi=0;bi<batch.length;bi++){(function(sym){var p=fetch("https://api.allorigins.win/raw?url="+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(sym)+"?interval=1d&range=1d"),{signal:AbortSignal.timeout(8000)}).then(function(r){return r.json()}).then(function(d){var pr=d&&d.chart&&d.chart.result&&d.chart.result[0]&&d.chart.result[0].meta&&d.chart.result[0].meta.regularMarketPrice;if(pr){if(sym==="CADUSD=X"){ux=1/pr;SJ("ux",ux)}else{var cs=sym.replace(".TO","");for(var j=0;j<H.length;j++){if(H[j].s===cs||H[j].s===cs+".TO")H[j].p=pr}for(j=0;j<RE.length;j++){if(RE[j].s===cs)RE[j].p=pr}}ok++}else fail++}).catch(function(){fail++}).then(function(){done++;if(pp)pp.style.width=(done/list.length*100)+"%";if(ps)ps.textContent=done+"/"+list.length+" ("+ok+" ok)"});allPromises.push(p)})(batch[bi])}}Promise.all(allPromises).then(function(){lr=new Date().toISOString();save();if(btn){btn.disabled=false;btn.textContent="⟳ Refresh"}document.getElementById("sd").className="dot "+(ok?"dot-g":"dot-y");if(ok)toast(ok+" prices updated");else toast("Failed");rS();if(curTab==="portfolio")rPTable();if(curTab==="resp")rResp();if(curTab==="settings")rSet()})}
function toggleAR(){if(arTimer){clearInterval(arTimer);arTimer=null;var b=document.getElementById("arb");if(b)b.textContent="▶ Auto 60s";toast("Stopped")}else{refreshPrices();arTimer=setInterval(refreshPrices,60000);var b2=document.getElementById("arb");if(b2)b2.textContent="⏸ Stop";toast("Auto on")}}

// ═══ EXPORT ═══
function expJSON(){var bl=new Blob([JSON.stringify(getAllData(),null,2)],{type:"application/json"});var a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="finance_"+new Date().toISOString().split("T")[0]+".json";a.click();toast("Exported")}
function impJSON(){var inp=document.createElement("input");inp.type="file";inp.accept=".json";inp.onchange=function(e){var r=new FileReader();r.onload=function(ev){try{applyData(JSON.parse(ev.target.result));save();toast("Imported!");setTimeout(function(){location.reload()},600)}catch(ex){toast("Invalid")}};r.readAsText(e.target.files[0])};inp.click()}
function expCSV(){var csv="Symbol,Currency,AvgCost,Shares,Price,Account,Type\n";var c=calc();for(var i=0;i<c.R.length;i++){var h=c.R[i];csv+=h.s+","+(h.t==="U"?"USD":"CAD")+","+h.c+","+h.n+","+(h.p||h.c)+","+h.a+","+h.k+"\n"}var bl=new Blob([csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="portfolio.csv";a.click()}

checkGmailCallback();initNav();
if(ghToken&&gistId){pullFromGist().then(function(ok){if(ok){rS();initNav()}})}
