<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="theme-color" content="#05080f">
<title>Financial Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#05080f;--bg2:#0a0f1a;--cd:#0f1525;--cd2:#151d30;--bd:#1a2540;--bd2:#253558;--tx:#dfe8f5;--mt:#6b7fa0;--ac:#00e5c8;--ac2:#0a3a35;--gn:#00d68f;--gn2:#053527;--rd:#ff5c72;--rd2:#3d1520;--gl:#ffb547;--pu:#9b7dff;--bl:#4d9fff}
[data-theme="light"]{--bg:#f4f6fb;--bg2:#e8ecf4;--cd:#fff;--cd2:#f0f2f8;--bd:#d4dae8;--bd2:#bcc5d8;--tx:#1a1f2e;--mt:#5c6a82;--ac:#00a89a;--ac2:#d0f5f0;--gn:#00a87a;--gn2:#d0f5e8;--rd:#e0374e;--rd2:#fde8ec;--gl:#d4870a;--pu:#7b5ec7;--bl:#2d7de0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;transition:background .3s,color .3s;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .2s ease both}
.hd{background:var(--cd);padding:14px 18px;border-bottom:1px solid var(--bd)}
[data-theme="dark"] .hd{background:linear-gradient(160deg,#080d18,#0d1530 45%,#120e28 75%,#080d18)}
.hd h1{font-size:18px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,var(--ac),var(--pu) 60%,#ff6baa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.sub{color:var(--mt);font-size:9px;font-family:'JetBrains Mono',monospace;margin-top:1px}
.nw{font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--ac);letter-spacing:-.8px}
.nv{display:flex;gap:1px;padding:4px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nb{padding:5px 10px;border-radius:4px;border:none;cursor:pointer;font-size:10px;font-weight:600;font-family:'Poppins',sans-serif;background:transparent;color:var(--mt);white-space:nowrap;transition:all .12s}.nb:active{transform:scale(.97)}.nb.on{background:var(--ac2);color:var(--ac)}
.cn{padding:10px 14px;max-width:1400px;margin:0 auto}
.g{display:grid;gap:7px;margin-bottom:10px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:700px){.g3,.g4{grid-template-columns:1fr 1fr}}@media(max-width:400px){.g2,.g3,.g4{grid-template-columns:1fr}}
.c{background:var(--cd);border-radius:6px;border:1px solid var(--bd);padding:10px;transition:all .2s}
.lb{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mt);margin-bottom:2px}
.vl{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.8px}
.sl{font-size:9px;color:var(--mt);font-family:'JetBrains Mono',monospace}
.mn{font-family:'JetBrains Mono',monospace}
.b{padding:5px 10px;border-radius:4px;border:1px solid var(--bd);cursor:pointer;font-size:10px;font-weight:600;font-family:'Poppins',sans-serif;background:var(--cd);color:var(--tx);display:inline-flex;align-items:center;gap:3px;transition:all .12s}
.b:active{transform:scale(.97)}.bp{background:linear-gradient(135deg,#00e5c8,#4d9fff);color:#05080f;border:none;font-weight:700}.bs{padding:3px 8px;font-size:9px}.br{color:var(--rd);border-color:var(--rd2)}
.lnk{cursor:pointer}.lnk:active{opacity:.8}
.tw{overflow-x:auto;border-radius:5px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:5px 7px;border-bottom:2px solid var(--bd);color:var(--mt);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--cd);position:sticky;top:0;cursor:pointer;white-space:nowrap}
td{padding:4px 7px;border-bottom:1px solid var(--bd);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap}
tr:hover td{background:var(--cd2)}.gv{color:var(--gn);font-weight:600}.rv{color:var(--rd);font-weight:600}
input,select{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:5px 8px;color:var(--tx);font-size:11px;font-family:'Poppins',sans-serif;outline:none;width:100%;transition:all .2s}
input:focus,select:focus{border-color:var(--ac)}
.fl{font-size:8px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;display:block}
.fg{display:flex;flex-direction:column;margin-bottom:4px}
.sr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd);font-size:11px;align-items:center}.sr:last-child{border-bottom:none}
.ar{padding:8px 10px;border-radius:5px;background:var(--bg);margin-bottom:4px;transition:background .3s}
.bi{display:flex;align-items:center;gap:4px;padding:4px 6px;border-radius:4px;background:var(--bg);font-size:10px;transition:background .3s}
.bi label{color:var(--mt);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bi input{width:55px;text-align:right;padding:3px 4px;font-family:'JetBrains Mono',monospace;font-size:10px}
.tc{position:fixed;top:8px;right:8px;z-index:9999}
.to{padding:7px 12px;border-radius:5px;font-size:11px;font-weight:600;background:var(--gn2);color:var(--gn);border:1px solid var(--gn)}
.tp{display:none}.tp.on{display:block}
.bg{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.2px}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}.dot-g{background:var(--gn);box-shadow:0 0 4px var(--gn)}.dot-y{background:var(--gl)}
.sb{display:flex;gap:5px;margin-bottom:8px;align-items:center;flex-wrap:wrap}.sb input{max-width:200px;flex:1}
.pr{height:4px;border-radius:2px;background:var(--bd);overflow:hidden;margin-top:4px}.pf{height:100%;border-radius:2px;transition:width .3s}
.tt{position:relative;width:36px;height:20px;border-radius:10px;background:var(--bd);cursor:pointer;border:none;padding:0;transition:background .3s}
.tt::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--ac);transition:transform .3s}
[data-theme="light"] .tt::after{transform:translateX(16px)}
.trade-card{padding:10px;border-radius:6px;background:var(--bg);margin-bottom:6px;border:1px solid var(--bd)}
/* Transaction sub-rows */
.txn-row{background:var(--bg2);font-size:10px}
.txn-row td{padding:3px 7px 3px 28px;color:var(--mt);border-bottom:1px solid var(--bd)}
.txn-toggle{cursor:pointer;user-select:none;display:inline-block;width:14px;text-align:center}
/* Setup wizard */
.wizard{max-width:500px;margin:40px auto;text-align:center;padding:20px}
.wizard h2{font-size:20px;font-weight:700;margin-bottom:8px}
.wizard p{color:var(--mt);font-size:12px;margin-bottom:16px;line-height:1.6}
</style>
</head>
<body>
<div id="tc" class="tc"></div>
<div class="hd">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
<div><h1>Financial Command Center</h1><div class="sub"><span class="dot" id="sd"></span> <span id="stx">Loading...</span> <span style="color:var(--ac);margin-left:8px">v1.2.0</span></div></div>
<div style="display:flex;align-items:center;gap:10px">
<button class="tt" onclick="toggleTheme()" title="Day/Night"></button>
<div style="text-align:right"><div style="font-size:8px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;font-weight:600">Net Worth</div><div class="nw" id="gt">—</div></div>
</div></div></div>
<div class="nv" id="nv"></div>
<div class="cn">
<div class="tp on" id="t-summary"></div>
<div class="tp" id="t-portfolio"></div>
<div class="tp" id="t-resp"></div>
<div class="tp" id="t-trades"></div>
<div class="tp" id="t-budget"></div>
<div class="tp" id="t-dividends"></div>

<div class="tp" id="t-audit"></div>
<div class="tp" id="t-settings"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════
// SECURE VERSION — No personal data in source code
// All data loads from localStorage / GitHub Gist
// ═══════════════════════════════════════════════════════

// Empty defaults — real data comes from Gist sync
var SA=[];var SH=[];var SRE=[];var SO=[];
var SB={items:{},actuals:{},takeHome:0};
var DV={DFN:0.3221,TD:1.09,BNS:1.117,ENB:0.9918,"DFN-A":0.1787,XEQT:0.1813,"FCD-UN":0.134,BMO:1.71,VFV:0.4077,"NWH-UN":0.0924,"BEP-UN":0.5535,TF:0.1797,"DIR-UN":0.1787,T:0.4425,CPX:0.7083,WCP:0.1823,"QQC-T":0.041,"REI-UN":0.2893,NA:1.2825,CNQ:0.625,CM:1.09,GSY:1.6347,NPI:0.18,MFC:0.44,PFE:0.42,QQQ:0.52};

// ═══ STATE ═══
function LJ(k,f){try{var v=localStorage.getItem("fc_"+k);return v?JSON.parse(v):JSON.parse(JSON.stringify(f))}catch(e){return JSON.parse(JSON.stringify(f))}}
function SJ(k,v){try{localStorage.setItem("fc_"+k,JSON.stringify(v))}catch(e){}}
var H=LJ("h",SH),A=LJ("a",SA),O=LJ("o",SO),B=LJ("b",SB),RE=LJ("r",SRE),ux=LJ("ux",1.39005),lr=LJ("lr",null);
var gistId=LJ("gistId",""),ghToken=LJ("ghToken",""),theme=LJ("theme","dark");
var gmailClientId=LJ("gmailCid",""),gmailToken=LJ("gmailTk","");
var pendingTrades=LJ("pendT",[]),arTimer=null,syncBusy=false;
var txnLog=LJ("txnLog",[]);  // Transaction history: [{id,date,sym,action,shares,price,acct,tab}]
var auditLog=LJ("auditLog",[]); // Deleted items for restore
var sortK="pc",sortD="asc",editI=-1,curTab="summary";
var expanded={};  // Track which symbols have expanded txn rows
document.documentElement.setAttribute("data-theme",theme);

// ═══ HELPERS ═══
function F(n,d){if(d==null)d=2;if(n==null||isNaN(n))return"\u2014";return Number(n).toLocaleString("en-CA",{minimumFractionDigits:d,maximumFractionDigits:d})}
function FP(n){if(n==null||isNaN(n))return"\u2014";return(n>=0?"+":"")+(n*100).toFixed(2)+"%"}
function plc(n){return n>=0?"var(--gn)":"var(--rd)"}
function pcl(n){return n>=0?"gv":"rv"}
function tpc(t){return t==="TFSA"?"var(--gn)":t==="RRSP"?"var(--bl)":"var(--gl)"}
function kco(k){return k==="Growth"?"var(--pu)":k==="Dividend"?"var(--gn)":"var(--gl)"}
function toast(m){var c=document.getElementById("tc");c.innerHTML='<div class="to">'+m+"</div>";setTimeout(function(){c.innerHTML=""},2500)}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;")}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function acOpts(sel){var h="";for(var i=0;i<A.length;i++)h+='<option value="'+esc(A[i].id)+'"'+(sel===A[i].id?" selected":"")+'>'+esc(A[i].l)+"</option>";return h}
function toggleTheme(){theme=theme==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",theme);SJ("theme",theme);save()}

// ═══ GIST SYNC ═══
function getAllData(){return{h:H,a:A,o:O,b:B,r:RE,ux:ux,lr:lr,theme:theme,pendT:pendingTrades,txnLog:txnLog,auditLog:auditLog,ts:new Date().toISOString()}}
function applyData(d){if(d.h)H=d.h;if(d.a)A=d.a;if(d.o)O=d.o;if(d.b)B=d.b;if(d.r)RE=d.r;if(d.ux)ux=d.ux;if(d.lr)lr=d.lr;if(d.pendT)pendingTrades=d.pendT;if(d.txnLog)txnLog=d.txnLog;if(d.auditLog)auditLog=d.auditLog;if(d.theme){theme=d.theme;document.documentElement.setAttribute("data-theme",theme)}SJ("h",H);SJ("a",A);SJ("o",O);SJ("b",B);SJ("r",RE);SJ("ux",ux);SJ("lr",lr);SJ("theme",theme);SJ("pendT",pendingTrades);SJ("txnLog",txnLog);SJ("auditLog",auditLog)}
var syncT=null;
function save(){SJ("h",H);SJ("a",A);SJ("o",O);SJ("b",B);SJ("r",RE);SJ("ux",ux);SJ("pendT",pendingTrades);SJ("txnLog",txnLog);SJ("auditLog",auditLog);clearTimeout(syncT);syncT=setTimeout(syncToGist,2000)}
async function syncToGist(){if(!ghToken||syncBusy)return;syncBusy=true;try{var data=JSON.stringify(getAllData());if(gistId){await fetch("https://api.github.com/gists/"+gistId,{method:"PATCH",headers:{"Authorization":"token "+ghToken,"Content-Type":"application/json"},body:JSON.stringify({files:{"finance_data.json":{content:data}}})})}else{var r=await fetch("https://api.github.com/gists",{method:"POST",headers:{"Authorization":"token "+ghToken,"Content-Type":"application/json"},body:JSON.stringify({description:"Financial Command Center","public":false,files:{"finance_data.json":{content:data}}})});var j=await r.json();if(j.id){gistId=j.id;SJ("gistId",gistId)}}}catch(e){console.error(e)}syncBusy=false}
async function pullFromGist(){if(!ghToken||!gistId)return false;try{var r=await fetch("https://api.github.com/gists/"+gistId,{headers:{"Authorization":"token "+ghToken}});var j=await r.json();var c=j.files&&j.files["finance_data.json"]&&j.files["finance_data.json"].content;if(c){applyData(JSON.parse(c));return true}}catch(e){}return false}

// ═══ GMAIL ═══
function gmailAuth(){if(!gmailClientId){toast("Set Client ID in Settings first");return}var redirect=window.location.href.split("?")[0].split("#")[0];var url="https://accounts.google.com/o/oauth2/v2/auth?client_id="+encodeURIComponent(gmailClientId)+"&redirect_uri="+encodeURIComponent(redirect)+"&response_type=token&scope="+encodeURIComponent("https://www.googleapis.com/auth/gmail.readonly")+"&prompt=consent";window.location.href=url}
function checkGmailCallback(){var hash=window.location.hash;if(hash&&hash.indexOf("access_token")>0){var params={};hash.substring(1).split("&").forEach(function(p){var kv=p.split("=");params[kv[0]]=decodeURIComponent(kv[1])});if(params.access_token){gmailToken=params.access_token;SJ("gmailTk",gmailToken);window.location.hash="";toast("Gmail connected!")}}}
async function scanGmail(){if(!gmailToken){toast("Connect Gmail in Settings first");return}toast("Scanning...");try{var q='from:notifications@wealthsimple.com subject:"order has been filled" newer_than:30d';var r=await fetch("https://www.googleapis.com/gmail/v1/users/me/messages?q="+encodeURIComponent(q)+"&maxResults=20",{headers:{"Authorization":"Bearer "+gmailToken}});if(r.status===401){gmailToken="";SJ("gmailTk","");toast("Token expired \u2014 reconnect");return}var data=await r.json();if(!data.messages||!data.messages.length){toast("No trade emails found");return}var nw=[];for(var i=0;i<Math.min(data.messages.length,15);i++){var mr=await fetch("https://www.googleapis.com/gmail/v1/users/me/messages/"+data.messages[i].id+"?format=full",{headers:{"Authorization":"Bearer "+gmailToken}});var msg=await mr.json();var tr=parseWSEmail(msg);if(tr&&!isDup(tr))nw.push(tr)}if(nw.length){pendingTrades=pendingTrades.concat(nw);save();toast(nw.length+" trade(s) found!")}else toast("No new trades")}catch(e){console.error(e);toast("Scan failed")}}
function parseWSEmail(msg){var body="";function fb(p){if(p.body&&p.body.data)body+=atob(p.body.data.replace(/-/g,"+").replace(/_/g,"/"));if(p.parts)p.parts.forEach(fb)}if(msg.payload)fb(msg.payload);if(!body)return null;var account=(body.match(/Account:\s*(\S+)/i)||[])[1]||"";var type=(body.match(/Type:\s*([\w\s]+?)(?:\n|$)/i)||[])[1]||"";var symbol=(body.match(/Symbol:\s*(\S+)/i)||[])[1]||"";var shares=parseFloat((body.match(/Shares:\s*([\d,.]+)/i)||[])[1])||0;var price=parseFloat((body.match(/Average price:\s*\$?([\d,.]+)/i)||[])[1])||0;var total=parseFloat((body.match(/Total cost:\s*\$?([\d,.]+)/i)||[])[1])||0;var timeStr=(body.match(/Time:\s*(.+?)(?:\n|$)/i)||[])[1]||"";if(!symbol||!shares)return null;var isSell=type.toLowerCase().indexOf("sell")>=0;var acctMap={"RESP":"RESP Joint WS","TFSA":"SK TFSA WS","RRSP":"SK RRSP WS","Personal":"SK Non Reg"};return{symbol:symbol.toUpperCase(),action:isSell?"Sell":"Buy",shares:shares,price:price,total:total,account:account,acctId:acctMap[account]||"SK RRSP WS",date:timeStr,msgId:msg.id,currency:"CAD"}}
function isDup(tr){for(var i=0;i<pendingTrades.length;i++)if(pendingTrades[i].msgId===tr.msgId)return true;for(var j=0;j<txnLog.length;j++)if(txnLog[j].msgId===tr.msgId)return true;return false}

// ═══ TRANSACTION LOG ═══
function addTxn(sym,action,shares,price,acct,tab,msgId){
  txnLog.push({id:uid(),date:new Date().toISOString(),sym:sym,action:action,shares:shares,price:price,acct:acct,tab:tab,msgId:msgId||""});save()}
function getTxns(sym,acct){return txnLog.filter(function(t){return t.sym===sym&&(!acct||t.acct===acct)})}

// ═══ AUDIT LOG ═══
function auditAdd(type,data){auditLog.push({id:uid(),date:new Date().toISOString(),type:type,data:JSON.parse(JSON.stringify(data))});if(auditLog.length>200)auditLog=auditLog.slice(-200);save()}

// ═══ CALC ═══
function calc(){var R=[],i,j;for(i=0;i<H.length;i++){var h=H[i],r=h.t==="U"?ux:1,lp=h.p||h.c,cc=h.c*h.n*r,vc=lp*h.n*r;R.push({s:h.s,t:h.t,c:h.c,n:h.n,a:h.a,k:h.k,p:h.p,lp:lp,cc:cc,vc:vc,d:vc-cc,pc:cc?(vc-cc)/cc:0,_i:i})}var tC=0,tV=0;for(i=0;i<R.length;i++){tC+=R[i].cc;tV+=R[i].vc}var byT={};for(i=0;i<A.length;i++){var ac=A[i];if(!byT[ac.tp])byT[ac.tp]={h:0,co:0,ca:0,n:0};byT[ac.tp].ca+=(ac.cc||0)+(ac.cu||0)*ux}for(i=0;i<R.length;i++){var tp="Other";for(j=0;j<A.length;j++){if(A[j].id===R[i].a){tp=A[j].tp;break}}if(!byT[tp])byT[tp]={h:0,co:0,ca:0,n:0};byT[tp].h+=R[i].vc;byT[tp].co+=R[i].cc;byT[tp].n++}var cash=0;for(i=0;i<A.length;i++)cash+=(A[i].cc||0)+(A[i].cu||0)*ux;var oT=0;for(i=0;i<O.length;i++)oT+=O[i].a;var rspV=0,rspC=0;for(i=0;i<RE.length;i++){var rlp=RE[i].p||RE[i].c;rspV+=rlp*RE[i].n;rspC+=RE[i].c*RE[i].n}if(!byT["RESP"])byT["RESP"]={h:0,co:0,ca:0,n:0};byT["RESP"].h+=rspV;byT["RESP"].co+=rspC;byT["RESP"].n+=RE.length;var annD=0;for(i=0;i<R.length;i++){var dv=DV[R[i].s]||0;if(dv)annD+=dv*4*R[i].n*(R[i].t==="U"?ux:1)}var W=R.slice().sort(function(a,b){return b.pc-a.pc}).slice(0,5);var L=R.slice().sort(function(a,b){return a.pc-b.pc}).slice(0,5);return{R:R,tC:tC,tV:tV,tP:tV-tC,byT:byT,cash:cash,oT:oT,rspV:rspV,rspC:rspC,grand:tV+cash+oT+rspV,annD:annD,W:W,L:L,cnt:R.length}}

// ═══ NAV ═══
var TABS=[["summary","📊 Summary"],["portfolio","💼 Holdings"],["resp","🎓 RESP"],["trades","📨 Trades"],["budget","📋 Budget"],["dividends","💰 Dividends"],["other","🏦 Other"],["accounts","⚙ Accounts"],["audit","📜 Audit"],["settings","🔧 Settings"]];

function srt(k){if(sortK===k)sortD=sortD==="asc"?"desc":"asc";else{sortK=k;sortD="desc"}rPTable()}
function toggleExpanded(sym,acct){expanded[sym+"_"+acct]=!expanded[sym+"_"+acct];save();rPTable()}
function addTrade(){var s=(document.getElementById("ts").value||"").trim().toUpperCase(),t=document.getElementById("tt").value,c=parseFloat(document.getElementById("tc2").value),n=parseFloat(document.getElementById("tn").value),a=document.getElementById("ta").value,k=document.getElementById("tk").value;if(!s||!c||!n){toast("Fill all fields");return}

  addTxn(s,"Buy",n,c,a,"portfolio");
  // Update or create the holding
  var x=-1;for(var i=0;i<H.length;i++)if(H[i].s===s&&H[i].a===a){x=i;break}
  if(x>=0){var o=H[x],tn=o.n+n;H[x]={s:s,t:t,c:+((o.c*o.n+c*n)/tn).toFixed(4),n:tn,a:a,k:k,p:o.p||c};toast("Updated "+s)}
  else{H.push({s:s,t:t,c:c,n:n,a:a,k:k,p:c});toast("Added "+s)}
  save();rP();rS()}
function rmTrade(i){var removed=H[i];auditAdd("holding",removed);toast("Removed "+removed.s);H.splice(i,1);save();editI=-1;rPTable();rS()}
function rmTxn(txnId,holdingIdx){
  var ti=-1;for(var i=0;i<txnLog.length;i++){if(txnLog[i].id===txnId){ti=i;break}}
  if(ti<0)return;var tx=txnLog[ti];
  // Reverse the transaction on the holding
  if(tx.action==="Buy"&&holdingIdx>=0&&holdingIdx<H.length){
    H[holdingIdx].n=Math.max(0,H[holdingIdx].n-tx.shares);
    if(H[holdingIdx].n>0){var rem=H[holdingIdx];var totCost=rem.c*rem.n;rem.c=totCost>0?totCost/(rem.n):rem.c}
    else H.splice(holdingIdx,1)}
  auditAdd("txn",tx);txnLog.splice(ti,1);save();toast("Transaction reversed");rPTable();rS()}
function removeTxn(txnId,sym,acct){
  if(!confirm("Remove this transaction?"))return;
  var ti=-1;
  for(var i=0;i<txnLog.length;i++){
    if(txnLog[i].id===txnId){ti=i;break}
  }
  if(ti<0)return;
  var tx=txnLog[ti];
  var hi=-1;
  for(var j=0;j<H.length;j++){
    if(H[j].s===sym&&H[j].a===acct){hi=j;break}
  }
  if(hi>=0&&tx.action==="Buy"){
    var h=H[hi];
    var newQty=Math.max(0,h.n-tx.shares);
    if(newQty>0){
      var totalCost=(h.c*h.n)-(tx.price*tx.shares);
      H[hi].n=newQty;
      H[hi].c=totalCost/newQty;
    }else{
      H.splice(hi,1);
    }
  }
  auditAdd("txn",tx);
  txnLog.splice(ti,1);
  save();
  toast("Transaction removed");
  rPTable();
  rS();
}

// ═══ PRICES ═══
async function refreshPrices(){
  var btn=document.getElementById("rbtn");
  if(btn){btn.disabled=true;btn.textContent="⟳ ..."}
  
  var syms={};
  for(var i=0;i<H.length;i++){
    var s=H[i].s.replace(".TO","");
    syms[H[i].t==="U"?s:s+".TO"]=1;
  }
  for(i=0;i<RE.length;i++){
    syms[RE[i].s+".TO"]=1;
  }
  syms["CADUSD=X"]=1;
  
  var list=Object.keys(syms);
  var done=0,ok=0,fail=0;
  var pp=document.getElementById("pp"),ps=document.getElementById("ps");
  if(ps)ps.textContent="Fetching "+list.length+"...";
  
  // Batch process in groups of 5 to avoid rate limits
  for(var b=0;b<list.length;b+=5){
    var batch=list.slice(b,b+5);
    var promises=batch.map(function(sym){
      // Use direct Yahoo Finance API (works from GitHub Pages)
      return fetch("https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(sym)+"?interval=1d&range=1d")
        .then(function(r){return r.json()})
        .then(function(d){
          var p=d&&d.chart&&d.chart.result&&d.chart.result[0]&&d.chart.result[0].meta&&d.chart.result[0].meta.regularMarketPrice;
          if(p){
            if(sym==="CADUSD=X"){
              ux=1/p;
              SJ("ux",ux);
            }else{
              var cs=sym.replace(".TO","");
              for(var j=0;j<H.length;j++){
                if(H[j].s===cs||H[j].s===cs+".TO")H[j].p=p;
              }
              for(j=0;j<RE.length;j++){
                if(RE[j].s===cs)RE[j].p=p;
              }
            }
            ok++;
          }else{
            fail++;
          }
        })
        .catch(function(e){
          console.log("Failed to fetch "+sym+": "+e.message);
          fail++;
        })
        .finally(function(){
          done++;
          if(pp)pp.style.width=(done/list.length*100)+"%";
          if(ps)ps.textContent=done+"/"+list.length+" ("+ok+" ok)";
        });
    });
    await Promise.all(promises);
    // Small delay between batches
    if(b+5<list.length){
      await new Promise(function(resolve){setTimeout(resolve,500)});
    }
  }
  
  lr=new Date().toISOString();
  save();
  if(btn){btn.disabled=false;btn.textContent="⟳ Refresh"}
  document.getElementById("sd").className="dot "+(ok?"dot-g":"dot-y");
  if(ok)toast(ok+" prices updated");
  else toast("Price fetch failed - try again");
  rS();
  if(curTab==="portfolio")rPTable();
  if(curTab==="resp")rResp();
  if(curTab==="settings")rSet();
}

function expCSV(){var csv="Symbol,Currency,AvgCost,Shares,Price,Account,Type\n";for(var i=0;i<H.length;i++){var h=H[i];csv+=h.s+","+(h.t==="U"?"USD":"CAD")+","+h.c+","+h.n+","+(h.p||h.c)+","+h.a+","+h.k+"\n"}var bl=new Blob([csv],{type:"text/csv"});var a=document.createElement("a");a.href=URL.createObjectURL(bl);a.download="portfolio.csv";a.click()}
