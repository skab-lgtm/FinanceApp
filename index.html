async function scanGmail(){
  if(!gmailToken){toast("Connect Gmail in Settings first");return}
  toast("Scanning Gmail...");
  try{
    var q="from:notifications@wealthsimple.com subject:\"order has been filled\" newer_than:30d";
    var r=await fetch("https://www.googleapis.com/gmail/v1/users/me/messages?q="+encodeURIComponent(q)+"&maxResults=20",{headers:{"Authorization":"Bearer "+gmailToken}});
    if(r.status===401){gmailToken="";SJ("gmailTk","");toast("Gmail token expired \u2014 reconnect in Settings");return}
    var data=await r.json();
    if(!data.messages||data.messages.length===0){toast("No new trade emails found");return}
    var newTrades=[];
    for(var i=0;i<Math.min(data.messages.length,15);i++){
      var mr=await fetch("https://www.googleapis.com/gmail/v1/users/me/messages/"+data.messages[i].id+"?format=full",{headers:{"Authorization":"Bearer "+gmailToken}});
      var msg=await mr.json();
      var trade=parseWSEmail(msg);
      if(trade&&!isDuplicate(trade))newTrades.push(trade)}
    if(newTrades.length>0){pendingTrades=pendingTrades.concat(newTrades);save();toast("Found "+newTrades.length+" new trade(s)!")}
    else toast("No new trades (all already imported)")
  }catch(e){console.error(e);toast("Gmail scan failed")}}

function parseWSEmail(msg){
  // Extract plain text body
  var body="";
  function findBody(part){if(part.body&&part.body.data){body+=atob(part.body.data.replace(/-/g,"+").replace(/_/g,"/"))}if(part.parts){part.parts.forEach(findBody)}}
  if(msg.payload)findBody(msg.payload);
  if(!body)return null;

  // Parse WealthSimple format:
  // Account: RESP / TFSA / RRSP / Personal
  // Type: Limit Buy / Market Buy / Limit Sell / Market Sell
  // Symbol: XEQT
  // Shares: 20
  // Average price: $38.95
  // Total cost: $779.00
  // Time: March 27, 2026 15:03 EDT
  var account=(body.match(/Account:\s*(\S+)/i)||[])[1]||"";
  var type=(body.match(/Type:\s*([\w\s]+?)(?:\n|$)/i)||[])[1]||"";
  var symbol=(body.match(/Symbol:\s*(\S+)/i)||[])[1]||"";
  var shares=parseFloat((body.match(/Shares:\s*([\d,.]+)/i)||[])[1])||0;
  var price=parseFloat((body.match(/Average price:\s*\$?([\d,.]+)/i)||[])[1])||0;
  var total=parseFloat((body.match(/Total cost:\s*\$?([\d,.]+)/i)||[])[1])||0;
  var timeStr=(body.match(/Time:\s*(.+?)(?:\n|$)/i)||[])[1]||"";
  var msgDate="";
  if(msg.payload&&msg.payload.headers){msg.payload.headers.forEach(function(h){if(h.name==="Date")msgDate=h.value})}

  if(!symbol||!shares)return null;
  var isSell=type.toLowerCase().indexOf("sell")>=0;
  var acctMap={"RESP":"RESP Joint WS","TFSA":"SK TFSA WS","RRSP":"SK RRSP WS","Personal":"SK Non Reg","Non-registered":"SK Non Reg"};
  var acctId=acctMap[account]||"SK RRSP WS";

  return{symbol:symbol.toUpperCase(),action:isSell?"Sell":"Buy",shares:shares,price:price,total:total,account:account,acctId:acctId,date:timeStr||msgDate,msgId:msg.id,currency:"CAD"}}

function isDuplicate(trade){
  // Check against existing pending trades and recent holdings changes
  for(var i=0;i<pendingTrades.length;i++){if(pendingTrades[i].msgId===trade.msgId)return true}
  return false}

function approveTrade(idx){
  var tr=pendingTrades[idx];if(!tr)return;
  var isSell=tr.action==="Sell";
  if(isSell){
    var fi=-1;for(var i=0;i<H.length;i++){if(H[i].s===tr.symbol&&H[i].a===tr.acctId){fi=i;break}}
    if(fi>=0){H[fi].n=Math.max(0,H[fi].n-tr.shares);if(H[fi].n<=0)H.splice(fi,1)}
  }else{
    var fi2=-1;for(var i2=0;i2<H.length;i2++){if(H[i2].s===tr.symbol&&H[i2].a===tr.acctId){fi2=i2;break}}
    if(fi2>=0){var o=H[fi2],tn=o.n+tr.shares;H[fi2]={s:tr.symbol,t:"C",c:+((o.c*o.n+tr.price*tr.shares)/tn).toFixed(4),n:tn,a:tr.acctId,k:o.k,p:tr.price}}
    else H.push({s:tr.symbol,t:"C",c:tr.price,n:tr.shares,a:tr.acctId,k:"ETF",p:tr.price})}
  pendingTrades.splice(idx,1);save();toast((isSell?"Sold":"Bought")+" "+tr.shares+" "+tr.symbol);rTr();rS()}

async function refreshPrices(){var btn=document.getElementById("rbtn");if(btn){btn.disabled=true;btn.textContent="\u27f3 ..."}var syms={};for(var i=0;i<H.length;i++){var s=H[i].s.replace(".TO","");syms[H[i].t==="U"?s:s+".TO"]=1}syms["CADUSD=X"]=1;var list=Object.keys(syms);var done=0,ok=0,fail=0;var pp=document.getElementById("pp"),ps=document.getElementById("ps");if(ps)ps.textContent="Fetching "+list.length+"...";for(var b=0;b<list.length;b+=5){var batch=list.slice(b,b+5);var proms=batch.map(function(sym){return fetch("https://api.allorigins.win/raw?url="+encodeURIComponent("https://query1.finance.yahoo.com/v8/finance/chart/"+encodeURIComponent(sym)+"?interval=1d&range=1d"),{signal:AbortSignal.timeout(8000)}).then(function(r){return r.json()}).then(function(d){var p=d&&d.chart&&d.chart.result&&d.chart.result[0]&&d.chart.result[0].meta&&d.chart.result[0].meta.regularMarketPrice;if(p){if(sym==="CADUSD=X"){ux=1/p;SJ("ux",ux)}else{var cs=sym.replace(".TO","");for(var j=0;j<H.length;j++){if(H[j].s===cs||H[j].s===cs+".TO")H[j].p=p}}ok++}else fail++}).catch(function(){fail++}).finally(function(){done++;if(pp)pp.style.width=(done/list.length*100)+"%";if(ps)ps.textContent=done+"/"+list.length+" ("+ok+" ok)"})});await Promise.all(proms)}lr=new Date().toISOString();save();if(btn){btn.disabled=false;btn.textContent="\u27f3 Refresh"}document.getElementById("sd").className="dot "+(ok?"dot-g":"dot-y");if(ok)toast(ok+" prices updated");else toast("Failed");rS();rP();rSet()}
