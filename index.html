<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Finance">
<meta name="theme-color" content="#05080f">
<title>Financial Command Center 2.5</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{--bg:#05080f;--bg2:#0a0f1a;--cd:#0f1525;--cd2:#151d30;--bd:#1a2540;--bd2:#253558;--tx:#dfe8f5;--mt:#6b7fa0;--ac:#00e5c8;--ac2:#0a3a35;--gn:#00d68f;--gn2:#053527;--rd:#ff5c72;--rd2:#3d1520;--gl:#ffb547;--pu:#9b7dff;--bl:#4d9fff}
[data-theme="light"]{--bg:#f4f6fb;--bg2:#e8ecf4;--cd:#fff;--cd2:#f0f2f8;--bd:#d4dae8;--bd2:#bcc5d8;--tx:#1a1f2e;--mt:#5c6a82;--ac:#00a89a;--ac2:#d0f5f0;--gn:#00a87a;--gn2:#d0f5e8;--rd:#e0374e;--rd2:#fde8ec;--gl:#d4870a;--pu:#7b5ec7;--bl:#2d7de0}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--tx);min-height:100dvh;transition:background .3s,color .3s;font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}.fi{animation:fi .2s ease both}
.hd{background:var(--cd);padding:14px 18px;border-bottom:1px solid var(--bd)}
[data-theme="dark"] .hd{background:linear-gradient(160deg,#080d18,#0d1530 45%,#120e28 75%,#080d18)}
.hd h1{font-size:18px;font-weight:700;letter-spacing:-.3px;background:linear-gradient(135deg,var(--ac),var(--pu) 60%,#ff6baa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.sub{color:var(--mt);font-size:9px;font-family:'JetBrains Mono',monospace;margin-top:1px}
.nw{font-size:19px;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--ac);letter-spacing:-.8px}
.nv{display:flex;gap:1px;padding:4px 12px;background:var(--bg2);border-bottom:1px solid var(--bd);overflow-x:auto;-webkit-overflow-scrolling:touch}
.nb{padding:5px 10px;border-radius:4px;border:none;cursor:pointer;font-size:10px;font-weight:600;font-family:'Poppins',sans-serif;background:transparent;color:var(--mt);white-space:nowrap;transition:all .12s}.nb:active{transform:scale(.97)}.nb.on{background:var(--ac2);color:var(--ac)}
.cn{padding:10px 14px;max-width:1400px;margin:0 auto}
.g{display:grid;gap:7px;margin-bottom:10px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
@media(max-width:700px){.g3,.g4{grid-template-columns:1fr 1fr}}@media(max-width:400px){.g2,.g3,.g4{grid-template-columns:1fr}}
.c{background:var(--cd);border-radius:6px;border:1px solid var(--bd);padding:10px;transition:all .2s}
.lb{font-size:8px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--mt);margin-bottom:2px}
.vl{font-size:18px;font-weight:700;font-family:'JetBrains Mono',monospace;letter-spacing:-.8px}
.sl{font-size:9px;color:var(--mt);font-family:'JetBrains Mono',monospace}
.mn{font-family:'JetBrains Mono',monospace}
.b{padding:5px 10px;border-radius:4px;border:1px solid var(--bd);cursor:pointer;font-size:10px;font-weight:600;font-family:'Poppins',sans-serif;background:var(--cd);color:var(--tx);display:inline-flex;align-items:center;gap:3px;transition:all .12s}
.b:active{transform:scale(.97)}.bp{background:linear-gradient(135deg,#00e5c8,#4d9fff);color:#05080f;border:none;font-weight:700}.bs{padding:3px 8px;font-size:9px}.br{color:var(--rd);border-color:var(--rd2)}
.lnk{cursor:pointer}.lnk:active{opacity:.8}
.tw{overflow-x:auto;border-radius:5px;border:1px solid var(--bd)}
table{width:100%;border-collapse:collapse}
th{text-align:left;padding:5px 7px;border-bottom:2px solid var(--bd);color:var(--mt);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;background:var(--cd);position:sticky;top:0;cursor:pointer;white-space:nowrap}
td{padding:4px 7px;border-bottom:1px solid var(--bd);font-family:'JetBrains Mono',monospace;font-size:11px;white-space:nowrap}
tr:hover td{background:var(--cd2)}.gv{color:var(--gn);font-weight:600}.rv{color:var(--rd);font-weight:600}
input,select{background:var(--bg);border:1px solid var(--bd);border-radius:4px;padding:5px 8px;color:var(--tx);font-size:11px;font-family:'Poppins',sans-serif;outline:none;width:100%;transition:all .2s}
input:focus,select:focus{border-color:var(--ac)}
.fl{font-size:8px;color:var(--mt);font-weight:600;text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px;display:block}
.fg{display:flex;flex-direction:column;margin-bottom:4px}
.sr{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--bd);font-size:11px;align-items:center}.sr:last-child{border-bottom:none}
.budget-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:8px}
@media(max-width:800px){.budget-grid{grid-template-columns:1fr}}
.budget-item{background:var(--bg2);border-radius:6px;padding:8px;border:1px solid var(--bd)}
.budget-item-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.budget-item-name{font-weight:600;font-size:12px;color:var(--tx)}
.budget-item-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:6px}
.budget-field{background:var(--bg);border-radius:4px;padding:4px 6px}
.budget-field-label{font-size:9px;color:var(--mt);margin-bottom:2px}
.budget-field-value{font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace}
.budget-field input{width:100%;background:transparent;border:none;color:var(--tx);font-size:11px;font-weight:600;font-family:'JetBrains Mono',monospace;padding:2px 0}
.budget-field input:focus{outline:none}
.budget-status{display:inline-block;padding:2px 8px;border-radius:3px;font-size:9px;font-weight:600;text-transform:uppercase}
.budget-status.on-track{background:var(--gn);color:#000}
.budget-status.over{background:var(--rd);color:#fff}
.budget-progress{margin-top:4px}
.budget-progress-bar{height:6px;background:var(--bd);border-radius:3px;overflow:hidden}
.budget-progress-fill{height:100%;transition:width .3s,background .3s}
.budget-progress-text{font-size:9px;color:var(--mt);margin-top:2px}
.ar{padding:4px 6px;border-radius:3px;background:var(--bg);margin-bottom:2px;transition:background .3s}
.bi{display:flex;align-items:center;gap:3px;padding:2px 4px;border-radius:3px;background:var(--bg);font-size:9px;transition:background .3s}
.bi label{color:var(--mt);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bi input{width:50px;text-align:right;padding:2px 3px;font-family:'JetBrains Mono',monospace;font-size:9px}
.tc{position:fixed;top:8px;right:8px;z-index:9999}
.to{padding:7px 12px;border-radius:5px;font-size:11px;font-weight:600;background:var(--gn2);color:var(--gn);border:1px solid var(--gn);animation:fi .3s}
.tp{display:none}.tp.on{display:block}
.bg{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;font-weight:600;letter-spacing:.2px}
.dot{width:5px;height:5px;border-radius:50%;display:inline-block}.dot-g{background:var(--gn);box-shadow:0 0 4px var(--gn)}.dot-y{background:var(--gl);box-shadow:0 0 4px var(--gl)}.dot-r{background:var(--rd);box-shadow:0 0 4px var(--rd)}
.sb{display:flex;gap:5px;margin-bottom:8px;align-items:center;flex-wrap:wrap}.sb input{max-width:200px;flex:1}
.pr{height:4px;border-radius:2px;background:var(--bd);overflow:hidden;margin-top:4px}.pf{height:100%;border-radius:2px;transition:width .3s}
.tt{position:relative;width:36px;height:20px;border-radius:10px;background:var(--bd);cursor:pointer;border:none;padding:0;transition:background .3s}
.tt::after{content:'';position:absolute;top:2px;left:2px;width:16px;height:16px;border-radius:50%;background:var(--ac);transition:transform .3s}
[data-theme="light"] .tt::after{transform:translateX(16px)}
.trade-card{padding:10px;border-radius:6px;background:var(--bg);margin-bottom:6px;border:1px solid var(--bd)}
.txn-row{background:var(--bg2);font-size:10px}
.txn-row td{padding:2px 7px;color:var(--mt);border-bottom:1px solid var(--bd)}
.txn-toggle{cursor:pointer;user-select:none}
.wizard{max-width:500px;margin:40px auto;text-align:center;padding:20px}
.wizard h2{font-size:20px;font-weight:700;margin-bottom:8px}
.wizard p{color:var(--mt);font-size:12px;margin-bottom:16px;line-height:1.6}
.badge{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:700;letter-spacing:.3px}
.badge-pending{background:var(--gl);color:#05080f}
.badge-approved{background:var(--gn);color:#05080f}
.spinner{display:inline-block;width:12px;height:12px;border:2px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="tc" class="tc"></div>
<div class="hd">
<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:6px">
<div>
<h1>Financial Command Center 2.5</h1>
<div class="sub">
<span class="dot" id="sd"></span> 
<span id="stx">Loading...</span> 
<span style="color:var(--ac);margin-left:8px">v2.0.0</span>
</div>
</div>
<div style="display:flex;align-items:center;gap:10px">
<button class="tt" onclick="toggleTheme()" title="Day/Night"></button>
<div style="text-align:right">
<div style="font-size:8px;color:var(--mt);text-transform:uppercase;letter-spacing:1px;font-weight:600">Net Worth</div>
<div class="nw" id="gt">—</div>
</div>
</div>
</div>
</div>
<div class="nv" id="nv"></div>
<div class="cn">
<div class="tp on" id="t-summary"></div>
<div class="tp" id="t-portfolio"></div>
<div class="tp" id="t-resp"></div>
<div class="tp" id="t-trades"></div>
<div class="tp" id="t-budget"></div>
<div class="tp" id="t-dividends"></div>
<div class="tp" id="t-other"></div>
<div class="tp" id="t-accounts"></div>
<div class="tp" id="t-audit"></div>
<div class="tp" id="t-settings"></div>
</div>
<script>
// ═══════════════════════════════════════════════════════
// FINANCIAL COMMAND CENTER 2.0
// Refactored with:
// - Centralized state management
// - Alpha Vantage price fetching
// - Automatic FX conversion
// - Fixed Gmail trade detection with approval workflow
// - Transaction management with undo
// ═══════════════════════════════════════════════════════

// ═══ STORAGE HELPERS ═══
function LJ(k,f){try{var v=localStorage.getItem("fc2_"+k);return v?JSON.parse(v):JSON.parse(JSON.stringify(f))}catch(e){return JSON.parse(JSON.stringify(f))}}
function SJ(k,v){try{localStorage.setItem("fc2_"+k,JSON.stringify(v))}catch(e){}}

// ═══ INITIAL STATE ═══
var STATE = {
  holdings: LJ("holdings",[]),
  resp: LJ("resp",[]),
  accounts: LJ("accounts",[]),
  other: LJ("other",[]),
  budget: LJ("budget",{items:{},actuals:{},takeHome:0}),
  txnLog: LJ("txnLog",[]),
  pendingTrades: LJ("pendingTrades",[]),
  auditLog: LJ("auditLog",[]),
  priceCache: LJ("priceCache",{}), // {symbol: {price, timestamp, currency}}
  fxRate: LJ("fxRate",1.39),
  fxLastUpdate: LJ("fxLastUpdate",null),
  dividends: LJ("dividends",{
    DFN:0.3221,TD:1.09,BNS:1.117,ENB:0.9918,"DFN-A":0.1787,XEQT:0.1813,"FCD-UN":0.134,
    BMO:1.71,VFV:0.4077,"NWH-UN":0.0924,"BEP-UN":0.5535,TF:0.1797,"DIR-UN":0.1787,
    T:0.4425,CPX:0.7083,WCP:0.1823,"QQC-T":0.041,"REI-UN":0.2893,NA:1.2825,
    CNQ:0.625,CM:1.09,GSY:1.6347,NPI:0.18,MFC:0.44,PFE:0.42,QQQ:0.52
  })
};

// ═══ SETTINGS ═══
var CONFIG = {
  alphaVantageKey: LJ("avKey","8ZINHBVZWB3CVXLZ"),
  gmailClientId: LJ("gmailCid",""),
  gmailToken: LJ("gmailTk",""),
  ghToken: LJ("ghToken",""),
  gistId: LJ("gistId",""),
  theme: LJ("theme","dark"),
  autoFX: LJ("autoFX",true)
};

document.documentElement.setAttribute("data-theme",CONFIG.theme);

// ═══ UI STATE ═══
var UI = {
  curTab: "summary",
  sortKey: "pc",
  sortDir: "desc",
  editIdx: -1,
  expanded: {},
  searchTerm: "",
  filterType: "all",
  filterAcct: "all"
};

// ═══ HELPERS ═══
function F(n,d){if(d==null)d=2;if(n==null||isNaN(n))return "—";return Number(n).toLocaleString("en-CA",{minimumFractionDigits:d,maximumFractionDigits:d})}
function FP(n){if(n==null||isNaN(n))return "—";return(n>=0?"+":"")+(n*100).toFixed(2)+"%"}
function plc(n){return n>=0?"var(--gn)":"var(--rd)"}
function pcl(n){return n>=0?"gv":"rv"}
function tpc(t){return t==="TFSA"?"var(--gn)":t==="RRSP"?"var(--bl)":"var(--gl)"}
function kco(k){return k==="Growth"?"var(--pu)":k==="Dividend"?"var(--gn)":"var(--gl)"}
function toast(m){var c=document.getElementById("tc");c.innerHTML='<div class="to">'+m+"</div>";setTimeout(function(){c.innerHTML=""},2500)}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/'/g,"&#39;").replace(/</g,"&lt;")}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5)}
function toggleTheme(){CONFIG.theme=CONFIG.theme==="dark"?"light":"dark";document.documentElement.setAttribute("data-theme",CONFIG.theme);SJ("theme",CONFIG.theme);save()}

// ═══ SAVE & SYNC ═══
function save(){
  SJ("holdings",STATE.holdings);
  SJ("resp",STATE.resp);
  SJ("accounts",STATE.accounts);
  SJ("other",STATE.other);
  SJ("budget",STATE.budget);
  SJ("txnLog",STATE.txnLog);
  SJ("pendingTrades",STATE.pendingTrades);
  SJ("auditLog",STATE.auditLog);
  SJ("priceCache",STATE.priceCache);
  SJ("fxRate",STATE.fxRate);
  SJ("fxLastUpdate",STATE.fxLastUpdate);
  SJ("dividends",STATE.dividends);
  clearTimeout(window.syncTimer);
  window.syncTimer = setTimeout(syncToGist,2000);
}

function getAllData(){
  return {
    holdings: STATE.holdings,
    resp: STATE.resp,
    accounts: STATE.accounts,
    other: STATE.other,
    budget: STATE.budget,
    txnLog: STATE.txnLog,
    pendingTrades: STATE.pendingTrades,
    auditLog: STATE.auditLog,
    priceCache: STATE.priceCache,
    fxRate: STATE.fxRate,
    fxLastUpdate: STATE.fxLastUpdate,
    dividends: STATE.dividends,
    timestamp: new Date().toISOString()
  };
}

function applyData(d,skipSave){
  console.log("Applying data - Input keys:",Object.keys(d));
  
  // Handle v2.0 format (full names)
  if(d.holdings && Array.isArray(d.holdings))STATE.holdings=d.holdings;
  if(d.resp && Array.isArray(d.resp))STATE.resp=d.resp;
  if(d.accounts && Array.isArray(d.accounts))STATE.accounts=d.accounts;
  if(d.other && Array.isArray(d.other))STATE.other=d.other;
  if(d.budget)STATE.budget=d.budget;
  if(d.txnLog && Array.isArray(d.txnLog))STATE.txnLog=d.txnLog;
  if(d.pendingTrades && Array.isArray(d.pendingTrades))STATE.pendingTrades=d.pendingTrades;
  if(d.auditLog && Array.isArray(d.auditLog))STATE.auditLog=d.auditLog;
  if(d.priceCache)STATE.priceCache=d.priceCache;
  if(d.fxRate)STATE.fxRate=d.fxRate;
  if(d.fxLastUpdate)STATE.fxLastUpdate=d.fxLastUpdate;
  if(d.dividends)STATE.dividends=d.dividends;
  
  // Handle v1.5 format (short names) - AUTO MIGRATION
  if(d.h && Array.isArray(d.h))STATE.holdings=d.h;
  if(d.r && Array.isArray(d.r))STATE.resp=d.r;
  if(d.a && Array.isArray(d.a))STATE.accounts=d.a;
  if(d.o && Array.isArray(d.o))STATE.other=d.o;
  if(d.b)STATE.budget=d.b;
  if(d.ux)STATE.fxRate=d.ux;
  if(d.pendT && Array.isArray(d.pendT))STATE.pendingTrades=d.pendT;
  
  // Handle legacy dividend format
  if(!STATE.dividends || Object.keys(STATE.dividends).length===0){
    STATE.dividends={
      DFN:0.3221,TD:1.09,BNS:1.117,ENB:0.9918,"DFN-A":0.1787,XEQT:0.1813,"FCD-UN":0.134,
      BMO:1.71,VFV:0.4077,"NWH-UN":0.0924,"BEP-UN":0.5535,TF:0.1797,"DIR-UN":0.1787,
      T:0.4425,CPX:0.7083,WCP:0.1823,"QQC-T":0.041,"REI-UN":0.2893,NA:1.2825,
      CNQ:0.625,CM:1.09,GSY:1.6347,NPI:0.18,MFC:0.44,PFE:0.42,QQQ:0.52
    };
  }
  
  if(d.theme){CONFIG.theme=d.theme;document.documentElement.setAttribute("data-theme",CONFIG.theme)}
  
  console.log("✅ Data applied - Holdings:",STATE.holdings.length,"Accounts:",STATE.accounts.length,"RESP:",STATE.resp.length);
  
  if(!skipSave){
    save();
  }
}

var syncBusy=false;
async function syncToGist(){
  if(!CONFIG.ghToken||syncBusy)return;
  syncBusy=true;
  try{
    var data=JSON.stringify(getAllData(),null,2);
    if(CONFIG.gistId){
      await fetch("https://api.github.com/gists/"+CONFIG.gistId,{
        method:"PATCH",
        headers:{"Authorization":"token "+CONFIG.ghToken,"Content-Type":"application/json"},
        body:JSON.stringify({files:{"finance_data_v2.json":{content:data}}})
      });
    }else{
      var r=await fetch("https://api.github.com/gists",{
        method:"POST",
        headers:{"Authorization":"token "+CONFIG.ghToken,"Content-Type":"application/json"},
        body:JSON.stringify({description:"Financial Command Center 2.0",public:false,files:{"finance_data_v2.json":{content:data}}})
      });
      var j=await r.json();
      if(j.id){CONFIG.gistId=j.id;SJ("gistId",CONFIG.gistId)}
    }
  }catch(e){console.error("Gist sync failed:",e)}
  syncBusy=false;
}

async function pullFromGist(){
  if(!CONFIG.ghToken||!CONFIG.gistId)return false;
  try{
    console.log("☁️ Pulling from Gist:",CONFIG.gistId);
    var r=await fetch("https://api.github.com/gists/"+CONFIG.gistId,{
      headers:{"Authorization":"token "+CONFIG.ghToken}
    });
    var j=await r.json();
    console.log("📁 Gist response files:",Object.keys(j.files||{}));
    
    // Try v2.0 format first
    var c=j.files&&j.files["finance_data_v2.json"]&&j.files["finance_data_v2.json"].content;
    
    // Fall back to v1.5 format
    if(!c){
      c=j.files&&j.files["finance_data.json"]&&j.files["finance_data.json"].content;
      console.log("📄 Using v1.5 format from Gist");
    }
    
    if(c){
      console.log("📥 Parsing Gist data...");
      var data=JSON.parse(c);
      
      // Check if Gist has actual data
      var hasHoldings=(data.holdings&&data.holdings.length>0)||(data.h&&data.h.length>0);
      var hasAccounts=(data.accounts&&data.accounts.length>0)||(data.a&&data.a.length>0);
      
      if(!hasHoldings&&!hasAccounts){
        console.warn("⚠️ Gist has no holdings or accounts - skipping to prevent data loss");
        return false;
      }
      
      applyData(data,true);
      
      // Save to localStorage
      save();
      
      console.log("✅ Gist data applied - Holdings:",STATE.holdings.length,"Accounts:",STATE.accounts.length);
      return true;
    }else{
      console.error("❌ No data file found in Gist");
    }
  }catch(e){console.error("❌ Gist pull failed:",e)}
  return false;
}

// ═══ FX RATE MANAGEMENT ═══
async function fetchFXRate(){
  try{
    document.getElementById("sd").className="dot dot-y";
    var r=await fetch("https://api.exchangerate-api.com/v4/latest/USD");
    var d=await r.json();
    if(d&&d.rates&&d.rates.CAD){
      STATE.fxRate=d.rates.CAD;
      STATE.fxLastUpdate=new Date().toISOString();
      save();
      document.getElementById("sd").className="dot dot-g";
      return true;
    }
  }catch(e){
    console.error("FX fetch failed:",e);
    document.getElementById("sd").className="dot dot-r";
  }
  return false;
}

// Auto-fetch FX on load if stale (>24h) or never fetched
if(CONFIG.autoFX && (!STATE.fxLastUpdate || Date.now()-new Date(STATE.fxLastUpdate).getTime()>86400000)){
  setTimeout(function(){
    fetchFXRate().then(function(ok){
      if(ok){toast("FX updated: "+STATE.fxRate.toFixed(4));recalc()}
    });
  },1000);
}

// ═══ PRICE FETCHING - ALPHA VANTAGE ═══
async function fetchPrice(symbol){
  if(!CONFIG.alphaVantageKey){
    toast("Set Alpha Vantage API key in Settings");
    return null;
  }
  
  // Check cache (valid for 15 minutes)
  var cached=STATE.priceCache[symbol];
  if(cached && Date.now()-new Date(cached.timestamp).getTime()<900000){
    console.log("📦 Using cached price for",symbol,"("+formatDate(cached.timestamp)+")");
    return {price:cached.price,currency:cached.currency};
  }
  
  // Clear stale cache
  if(cached){
    console.log("🗑️ Clearing stale cache for",symbol);
    delete STATE.priceCache[symbol];
  }
  
  try{
    document.getElementById("sd").className="dot dot-y";
    
    // Determine if this is a Canadian stock and add .TO if needed
    var apiSymbol=symbol;
    var isCadStock=false;
    
    // Canadian stock indicators
    if(symbol.includes("-UN")||symbol.includes("-T")||symbol.includes("-A")||
       ["GSY","TD","BNS","ENB","BMO","TF","T","CPX","WCP","NA","CNQ","CM","MFC","AMD"].indexOf(symbol)>=0){
      isCadStock=true;
      // Add .TO for TSX if not already present
      if(!symbol.endsWith(".TO")&&!symbol.includes(".")){
        apiSymbol=symbol+".TO";
      }
    }
    
    // US stocks - check if already has exchange suffix
    if(symbol.endsWith(".TO")){
      isCadStock=true;
      apiSymbol=symbol;
    }
    
    console.log("🔍 Fetching fresh price for",symbol,"using API symbol:",apiSymbol);
    
    var url="https://www.alphavantage.co/query?function=GLOBAL_QUOTE&symbol="+encodeURIComponent(apiSymbol)+"&apikey="+CONFIG.alphaVantageKey;
    var r=await fetch(url);
    var d=await r.json();
    
    if(d["Global Quote"] && d["Global Quote"]["05. price"]){
      var price=parseFloat(d["Global Quote"]["05. price"]);
      var currency=isCadStock?"CAD":"USD";
      
      console.log("✅ Fresh price fetched:",symbol,"=","$"+price,currency);
      
      STATE.priceCache[symbol]={
        price: price,
        currency: currency,
        timestamp: new Date().toISOString()
      };
      save();
      document.getElementById("sd").className="dot dot-g";
      return {price:price,currency:currency};
    }else if(d.Note && d.Note.includes("API call frequency")){
      toast("API rate limit - wait 1 min");
      console.warn("⚠️ Rate limited for",symbol);
    }else{
      console.warn("❌ No price data returned for",apiSymbol,d);
    }
  }catch(e){
    console.error("❌ Price fetch failed for "+symbol+":",e);
    document.getElementById("sd").className="dot dot-r";
  }
  return null;
}

async function refreshPrices(){
  if(!CONFIG.alphaVantageKey){
    toast("Set Alpha Vantage API key in Settings first");
    return;
  }
  
  toast("Fetching prices...");
  var symbols=[];
  var symbolMap={};  // Track which holdings/resp use which symbol
  
  // Collect symbols from holdings
  for(var i=0;i<STATE.holdings.length;i++){
    var sym=STATE.holdings[i].s;
    if(!symbolMap[sym])symbolMap[sym]={holdings:[],resp:[]};
    symbolMap[sym].holdings.push(i);
    if(symbols.indexOf(sym)<0)symbols.push(sym);
  }
  
  // Collect symbols from RESP
  for(i=0;i<STATE.resp.length;i++){
    sym=STATE.resp[i].s;
    if(!symbolMap[sym])symbolMap[sym]={holdings:[],resp:[]};
    symbolMap[sym].resp.push(i);
    if(symbols.indexOf(sym)<0)symbols.push(sym);
  }
  
  console.log("🔄 Refreshing prices for",symbols.length,"symbols");
  
  // Rate limit: 5 calls per minute on free tier
  var updated=0;
  for(i=0;i<Math.min(symbols.length,5);i++){
    var result=await fetchPrice(symbols[i]);
    if(result){
      // Update ALL holdings with this symbol
      var indices=symbolMap[symbols[i]].holdings;
      for(var j=0;j<indices.length;j++){
        STATE.holdings[indices[j]].p=result.price;
        STATE.holdings[indices[j]].priceUpdated=new Date().toISOString();
      }
      
      // Update ALL RESP positions with this symbol
      indices=symbolMap[symbols[i]].resp;
      for(j=0;j<indices.length;j++){
        STATE.resp[indices[j]].p=result.price;
        STATE.resp[indices[j]].priceUpdated=new Date().toISOString();
      }
      
      updated++;
    }
    // Wait 12 seconds between calls (5 per minute max)
    if(i<Math.min(symbols.length,5)-1){
      await new Promise(resolve=>setTimeout(resolve,12000));
    }
  }
  
  save();
  toast("Updated "+updated+" price"+(updated!==1?"s":""));
  recalc();
}

function gmailAuth(){
  if(!CONFIG.gmailClientId){
    toast("Set Gmail Client ID in Settings first");
    return;
  }
  var redirect=window.location.href.split("?")[0].split("#")[0];
  var url="https://accounts.google.com/o/oauth2/v2/auth"+
    "?client_id="+encodeURIComponent(CONFIG.gmailClientId)+
    "&redirect_uri="+encodeURIComponent(redirect)+
    "&response_type=token"+
    "&scope="+encodeURIComponent("https://www.googleapis.com/auth/gmail.readonly")+

}

function checkGmailCallback(){
  var hash=window.location.hash;
  if(hash&&hash.indexOf("access_token")>0){
    var params={};
    hash.substring(1).split("&").forEach(function(p){
      var kv=p.split("=");
      params[kv[0]]=decodeURIComponent(kv[1]);
    });
    if(params.access_token){
      CONFIG.gmailToken=params.access_token;
      SJ("gmailTk",CONFIG.gmailToken);
      window.location.hash="";
      toast("Gmail connected!");
    }
  }
}

async function scanGmail(){
  if(!CONFIG.gmailToken){
    toast("Connect Gmail in Settings first");
    return;
  }
  
  toast("Scanning emails...");
  try{
    // Search for WealthSimple trade emails
    var q='from:notifications@wealthsimple.com OR from:notifications@o.wealthsimple.com subject:"order has been filled" newer_than:30d';
    var r=await fetch("https://www.googleapis.com/gmail/v1/users/me/messages?q="+encodeURIComponent(q)+"&maxResults=20",{
      headers:{"Authorization":"Bearer "+CONFIG.gmailToken}
    });
    
    if(r.status===401){
      CONFIG.gmailToken="";
      SJ("gmailTk","");
      toast("Token expired — reconnect");
      return;
    }
    
    var data=await r.json();
    if(!data.messages||!data.messages.length){
      toast("No trade emails found");
      return;
    }
    
    var newTrades=[];
    for(var i=0;i<Math.min(data.messages.length,15);i++){
      var mr=await fetch("https://www.googleapis.com/gmail/v1/users/me/messages/"+data.messages[i].id+"?format=full",{
        headers:{"Authorization":"Bearer "+CONFIG.gmailToken}
      });
      var msg=await mr.json();
      var trade=parseWSEmail(msg);
      if(trade && !isDuplicate(trade)){
        newTrades.push(trade);
      }
    }
    
    if(newTrades.length){
      STATE.pendingTrades=STATE.pendingTrades.concat(newTrades);
      save();
      toast(newTrades.length+" new trade(s) found!");
      initNav();
    }else{
      toast("No new trades");
    }
  }catch(e){
    console.error("Gmail scan failed:",e);
    toast("Scan failed");
  }
}

function parseWSEmail(msg){
  var body="";
  
  function extractBody(part){
    if(part.body&&part.body.data){
      body+=atob(part.body.data.replace(/-/g,"+").replace(/_/g,"/"));
    }
    if(part.parts)part.parts.forEach(extractBody);
  }
  
  if(msg.payload)extractBody(msg.payload);
  if(!body)return null;
  
  // Extract fields with improved regex
  var accountMatch=body.match(/Account(?:\s+nickname)?:\s*([A-Z\s-]+?)(?:\n|Type)/i);
  var account=accountMatch?accountMatch[1].trim():"";
  
  var typeMatch=body.match(/Type:\s*([\w\s]+?)(?:\n|$)/i);
  var type=typeMatch?typeMatch[1].trim():"";
  
  var symbolMatch=body.match(/Symbol:\s*([A-Z0-9.-]+)/i);
  var symbol=symbolMatch?symbolMatch[1]:"";
  
  var sharesMatch=body.match(/Shares:\s*([\d,.]+)/i);
  var shares=sharesMatch?parseFloat(sharesMatch[1].replace(/,/g,"")):0;
  
  var priceMatch=body.match(/Average\s+price:\s*(?:US|CA)?\$?([\d,.]+)/i);
  var price=priceMatch?parseFloat(priceMatch[1].replace(/,/g,"")):0;
  
  var totalMatch=body.match(/Total\s+cost:\s*(?:US|CA)?\$?([\d,.]+)/i);
  var total=totalMatch?parseFloat(totalMatch[1].replace(/,/g,"")):0;
  
  var timeMatch=body.match(/Time:\s*(.+?)(?:\n|EDT|EST|$)/i);
  var timeStr=timeMatch?timeMatch[1].trim():"";
  
  if(!symbol||!shares)return null;
  
  // Calculate price from total if missing
  if(!price&&total&&shares)price=total/shares;
  
  var isSell=type.toLowerCase().indexOf("sell")>=0;
  var isUSD=body.indexOf("US$")>=0 || body.indexOf("USD")>=0;
  
  // Map account names to IDs
  var acctMap={
    "RESP":"RESP Joint WS",
    "RESP - SYED":"RESP Joint WS",
    "TFSA":"SK TFSA WS",
    "RRSP":"SK RRSP WS",
    "RRSP - SYED":"SK RRSP WS",
    "Personal":"SK Non Reg",
    "Non-Registered":"SK Non Reg"
  };
  
  return {
    id: uid(),
    symbol: symbol.toUpperCase(),
    action: isSell?"Sell":"Buy",
    shares: shares,
    price: price,
    total: total,
    account: account,
    acctId: acctMap[account]||"SK Non Reg",
    date: timeStr,
    msgId: msg.id,
    currency: isUSD?"USD":"CAD",
    status: "pending"
  };
}

function isDuplicate(trade){
  for(var i=0;i<STATE.pendingTrades.length;i++){
    if(STATE.pendingTrades[i].msgId===trade.msgId)return true;
  }
  for(var j=0;j<STATE.txnLog.length;j++){
    if(STATE.txnLog[j].msgId===trade.msgId)return true;
  }
  return false;
}

// ═══ TRANSACTION MANAGEMENT ═══
function addTransaction(sym,action,shares,price,acctId,tab,msgId,currency){
  var txn={
    id: uid(),
    date: new Date().toISOString(),
    sym: sym,
    action: action,
    shares: shares,
    price: price,
    acctId: acctId,
    tab: tab,
    msgId: msgId||"",
    currency: currency||"CAD"
  };
  STATE.txnLog.push(txn);
  save();
  return txn;
}

function getTransactions(sym,acctId){
  return STATE.txnLog.filter(function(t){
    return t.sym===sym && (!acctId || t.acctId===acctId);
  });
}

function deleteTransaction(txnId){
  var idx=-1;
  for(var i=0;i<STATE.txnLog.length;i++){
    if(STATE.txnLog[i].id===txnId){
      idx=i;
      break;
    }
  }
  if(idx>=0){
    var txn=STATE.txnLog[idx];
    STATE.auditLog.push({
      id:uid(),
      date:new Date().toISOString(),
      type:"txn",
      data:JSON.parse(JSON.stringify(txn))
    });
    STATE.txnLog.splice(idx,1);
    
    // Recalculate holding
    recalculateHolding(txn.sym,txn.acctId,txn.tab);
    save();
    return true;
  }
  return false;
}

function recalculateHolding(sym,acctId,tab){
  var txns=getTransactions(sym,acctId);
  if(txns.length===0){
    // Remove holding entirely
    if(tab==="portfolio"){
      for(var i=STATE.holdings.length-1;i>=0;i--){
        if(STATE.holdings[i].s===sym && STATE.holdings[i].a===acctId){
          STATE.auditLog.push({
            id:uid(),
            date:new Date().toISOString(),
            type:"holding",
            data:JSON.parse(JSON.stringify(STATE.holdings[i]))
          });
          STATE.holdings.splice(i,1);
        }
      }
    }else if(tab==="resp"){
      for(i=STATE.resp.length-1;i>=0;i--){
        if(STATE.resp[i].s===sym && STATE.resp[i].a===acctId){
          STATE.auditLog.push({
            id:uid(),
            date:new Date().toISOString(),
            type:"resp_holding",
            data:JSON.parse(JSON.stringify(STATE.resp[i]))
          });
          STATE.resp.splice(i,1);
        }
      }
    }
    return;
  }
  
  // Recalc from transactions
  var totalShares=0;
  var totalCost=0;
  var lastPrice=0;
  var currency="CAD";
  var kind="Growth";
  
  for(var j=0;j<txns.length;j++){
    var t=txns[j];
    if(t.action==="Buy"){
      totalShares+=t.shares;
      totalCost+=t.shares*t.price;
    }else{
      totalShares-=t.shares;
      totalCost-=t.shares*t.price;
    }
    lastPrice=t.price;
    currency=t.currency||"CAD";
  }
  
  var avgCost=totalShares>0?totalCost/totalShares:0;
  
  // Update holding
  var found=false;
  var holdings=tab==="portfolio"?STATE.holdings:STATE.resp;
  for(i=0;i<holdings.length;i++){
    if(holdings[i].s===sym && holdings[i].a===acctId){
      holdings[i].n=totalShares;
      holdings[i].c=avgCost;
      holdings[i].p=lastPrice;
      holdings[i].t=currency==="USD"?"U":"C";
      found=true;
      break;
    }
  }
  
  if(!found && totalShares>0){
    // Create new holding
    var newHolding={
      s:sym,
      t:currency==="USD"?"U":"C",
      c:avgCost,
      n:totalShares,
      p:lastPrice,
      a:acctId,
      k:kind
    };
    if(tab==="portfolio"){
      STATE.holdings.push(newHolding);
    }else{
      STATE.resp.push(newHolding);
    }
  }
}

// ═══ APPROVE/REJECT TRADES ═══
function approveTrade(idx){
  var trade=STATE.pendingTrades[idx];
  if(!trade)return;
  
  // Determine which tab this belongs to
  var tab="portfolio";
  for(var i=0;i<STATE.accounts.length;i++){
    if(STATE.accounts[i].id===trade.acctId){
      if(STATE.accounts[i].tp==="RESP"){
        tab="resp";
      }
      break;
    }
  }
  
  // Add to transaction log
  addTransaction(
    trade.symbol,
    trade.action,
    trade.shares,
    trade.price,
    trade.acctId,
    tab,
    trade.msgId,
    trade.currency
  );
  
  // Update or create holding
  var holdings=tab==="portfolio"?STATE.holdings:STATE.resp;
  var found=false;
  
  for(i=0;i<holdings.length;i++){
    if(holdings[i].s===trade.symbol && holdings[i].a===trade.acctId){
      // Existing holding - update
      var totalShares=holdings[i].n;
      var totalCost=holdings[i].c*holdings[i].n;
      
      if(trade.action==="Buy"){
        totalShares+=trade.shares;
        totalCost+=trade.shares*trade.price;
      }else{
        totalShares-=trade.shares;
        totalCost-=trade.shares*trade.price;
      }
      
      holdings[i].n=totalShares;
      holdings[i].c=totalShares>0?totalCost/totalShares:0;
      holdings[i].p=trade.price;
      found=true;
      break;
    }
  }
  
  if(!found && trade.action==="Buy"){
    // New holding
    holdings.push({
      s:trade.symbol,
      t:trade.currency==="USD"?"U":"C",
      c:trade.price,
      n:trade.shares,
      p:trade.price,
      a:trade.acctId,
      k:"Growth"
    });
  }
  
  STATE.pendingTrades.splice(idx,1);
  save();
  toast("Trade approved: "+trade.symbol);
  recalc();
}

function rejectTrade(idx){
  var trade=STATE.pendingTrades[idx];
  if(!trade)return;
  
  STATE.auditLog.push({
    id:uid(),
    date:new Date().toISOString(),
    type:"rejected_trade",
    data:JSON.parse(JSON.stringify(trade))
  });
  
  STATE.pendingTrades.splice(idx,1);
  save();
  toast("Trade rejected");
  initNav();
  renderTrades();
}

// ═══ CALCULATION ENGINE ═══
function recalc(){
  var computed=calculate();
  
  // Update header
  document.getElementById("gt").textContent="$"+F(computed.grandTotal,0);
  document.getElementById("stx").textContent=computed.posCount+" pos · USD/CAD "+STATE.fxRate.toFixed(4)+" · "+formatDate(STATE.fxLastUpdate);
  
  // Update status dot
  if(STATE.fxLastUpdate){
    var age=Date.now()-new Date(STATE.fxLastUpdate).getTime();
    if(age<7200000){// <2h
      document.getElementById("sd").className="dot dot-g";
    }else if(age<86400000){// <24h
      document.getElementById("sd").className="dot dot-y";
    }else{
      document.getElementById("sd").className="dot dot-r";
    }
  }else{
    document.getElementById("sd").className="dot dot-r";
  }
  
  // Re-render current tab
  if(window.renderFunctions && window.renderFunctions[UI.curTab]){
    window.renderFunctions[UI.curTab]();
  }
}

function formatDate(iso){
  if(!iso)return "Never";
  var d=new Date(iso);
  var now=new Date();
  var diff=now-d;
  if(diff<3600000)return Math.floor(diff/60000)+"m ago";
  if(diff<86400000)return Math.floor(diff/3600000)+"h ago";
  return Math.floor(diff/86400000)+"d ago";
}

function calculate(){
  var rows=[];
  var fxRate=STATE.fxRate;
  
  // Process holdings
  for(var i=0;i<STATE.holdings.length;i++){
    var h=STATE.holdings[i];
    var rate=h.t==="U"?fxRate:1;
    var currentPrice=h.p||h.c;
    var costCAD=h.c*h.n*rate;
    var valueCAD=currentPrice*h.n*rate;
    
    rows.push({
      s:h.s,
      t:h.t,
      c:h.c,
      n:h.n,
      a:h.a,
      k:h.k,
      p:h.p,
      lp:currentPrice,
      cc:costCAD,
      vc:valueCAD,
      d:valueCAD-costCAD,
      pc:costCAD?(valueCAD-costCAD)/costCAD:0,
      _i:i,
      _tab:"portfolio"
    });
  }
  
  var totalCost=0;
  var totalValue=0;
  for(i=0;i<rows.length;i++){
    totalCost+=rows[i].cc;
    totalValue+=rows[i].vc;
  }
  
  // Account breakdown
  var byType={};
  for(i=0;i<STATE.accounts.length;i++){
    var ac=STATE.accounts[i];
    if(!byType[ac.tp]){
      byType[ac.tp]={holdings:0,cost:0,cash:0,count:0};
    }
    byType[ac.tp].cash+=(ac.cc||0)+(ac.cu||0)*fxRate;
  }
  
  for(i=0;i<rows.length;i++){
    var tp="Other";
    for(var j=0;j<STATE.accounts.length;j++){
      if(STATE.accounts[j].id===rows[i].a){
        tp=STATE.accounts[j].tp;
        break;
      }
    }
    if(!byType[tp]){
      byType[tp]={holdings:0,cost:0,cash:0,count:0};
    }
    byType[tp].holdings+=rows[i].vc;
    byType[tp].cost+=rows[i].cc;
    byType[tp].count++;
  }
  
  // Cash total
  var cashTotal=0;
  for(i=0;i<STATE.accounts.length;i++){
    cashTotal+=(STATE.accounts[i].cc||0)+(STATE.accounts[i].cu||0)*fxRate;
  }
  
  // Other investments
  var otherTotal=0;
  for(i=0;i<STATE.other.length;i++){
    otherTotal+=STATE.other[i].a;
  }
  
  // RESP - with FX conversion
  var respValue=0;
  var respCost=0;
  for(i=0;i<STATE.resp.length;i++){
    var re=STATE.resp[i];
    var rePrice=re.p||re.c;
    var reRate=re.t==="U"?fxRate:1;  // Apply FX rate for USD
    respValue+=rePrice*re.n*reRate;
    respCost+=re.c*re.n*reRate;
  }
  
  if(!byType["RESP"]){
    byType["RESP"]={holdings:0,cost:0,cash:0,count:0};
  }
  byType["RESP"].holdings+=respValue;
  byType["RESP"].cost+=respCost;
  byType["RESP"].count+=STATE.resp.length;
  
  // Annual dividends
  var annualDividends=0;
  for(i=0;i<rows.length;i++){
    var divRate=STATE.dividends[rows[i].s]||0;
    if(divRate){
      annualDividends+=divRate*4*rows[i].n*(rows[i].t==="U"?fxRate:1);
    }
  }
  
  // Winners & Losers
  var winners=rows.slice().sort(function(a,b){return b.pc-a.pc}).slice(0,5);
  var losers=rows.slice().sort(function(a,b){return a.pc-b.pc}).slice(0,5);
  
  return {
    rows: rows,
    totalCost: totalCost,
    totalValue: totalValue,
    totalPL: totalValue-totalCost,
    byType: byType,
    cashTotal: cashTotal,
    otherTotal: otherTotal,
    respValue: respValue,
    respCost: respCost,
    grandTotal: totalValue+cashTotal+otherTotal+respValue,
    annualDividends: annualDividends,
    winners: winners,
    losers: losers,
    posCount: rows.length
  };
}

// ═══ NAVIGATION ═══
var TABS=[
  ["summary","📊 Summary"],
  ["portfolio","💼 Holdings"],
  ["resp","🎓 RESP"],
  ["trades","📨 Trades"],
  ["budget","📋 Budget"],
  ["dividends","💰 Dividends"],
  ["other","🏦 Other"],
  ["accounts","⚙ Accounts"],
  ["audit","📜 Audit"],
  ["settings","🔧 Settings"]
];

function initNav(){
  var h="";
  for(var i=0;i<TABS.length;i++){
    var label=TABS[i][1];
    if(TABS[i][0]==="trades"&&STATE.pendingTrades.length){
      label+=" ("+STATE.pendingTrades.length+")";
    }
    if(TABS[i][0]==="audit"&&STATE.auditLog.length){
      label+=" ("+STATE.auditLog.length+")";
    }
    h+='<button class="nb'+(TABS[i][0]===UI.curTab?" on":"")+'" data-t="'+TABS[i][0]+'" onclick="goTo(\''+TABS[i][0]+'\')">'+label+"</button>";
  }
  document.getElementById("nv").innerHTML=h;
}

function goTo(tab){
  UI.curTab=tab;
  UI.editIdx=-1;
  initNav();
  
  var pages=document.querySelectorAll(".tp");
  for(var i=0;i<pages.length;i++){
    pages[i].classList.toggle("on",pages[i].id==="t-"+tab);
  }
  
  if(window.renderFunctions&&window.renderFunctions[tab]){
    window.renderFunctions[tab]();
  }
}

function card(title,value,subtitle,color,link){
  return '<div class="c lnk fi" onclick="goTo(\''+link+'\')">'+
    '<div class="lb">'+title+' →</div>'+
    '<div class="vl" style="color:'+color+'">'+value+'</div>'+
    '<div class="sl" style="color:'+color+'">'+subtitle+'</div>'+
    '</div>';
}

function renderPortfolioTable(){
  var c=calculate();
  var filtered=c.rows.slice();
  
  // Apply filters
  if(UI.searchTerm){
    var q=UI.searchTerm.toLowerCase();
    filtered=filtered.filter(function(r){
      return r.s.toLowerCase().indexOf(q)>=0 || 
             r.a.toLowerCase().indexOf(q)>=0 || 
             r.k.toLowerCase().indexOf(q)>=0;
    });
  }
  
  if(UI.filterType!=="all"){
    filtered=filtered.filter(function(r){return r.k===UI.filterType});
  }
  
  if(UI.filterAcct!=="all"){
    filtered=filtered.filter(function(r){
      for(var j=0;j<STATE.accounts.length;j++){
        if(STATE.accounts[j].id===r.a && STATE.accounts[j].tp===UI.filterAcct){
          return true;
        }
      }
      return false;
    });
  }
  
  // Sort
  filtered.sort(function(a,b){
    var av=a[UI.sortKey];
    var bv=b[UI.sortKey];
    if(typeof av==="string"){
      return UI.sortDir==="asc"?av.localeCompare(bv):bv.localeCompare(av);
    }
    return UI.sortDir==="asc"?(av-bv):(bv-av);
  });
  
  // Get unique account types
  var acctTypes=[];
  for(var x=0;x<STATE.accounts.length;x++){
    if(acctTypes.indexOf(STATE.accounts[x].tp)<0){
      acctTypes.push(STATE.accounts[x].tp);
    }
  }
  
  var h='<div class="c" style="margin-bottom:8px">'+
    '<div class="lb">Add Trade</div>'+
    '<div style="display:grid;grid-template-columns:repeat(6,1fr) auto;gap:4px;align-items:end">'+
    '<div class="fg"><label class="fl">Symbol</label><input id="ts" placeholder="AAPL" style="text-transform:uppercase"></div>'+
    '<div class="fg"><label class="fl">Curr</label><select id="tt"><option value="C">CAD</option><option value="U">USD</option></select></div>'+
    '<div class="fg"><label class="fl">Cost</label><input id="tc2" type="number" step="0.01"></div>'+
    '<div class="fg"><label class="fl">Qty</label><input id="tn" type="number" step="0.01"></div>'+
    '<div class="fg"><label class="fl">Account</label><select id="ta">';

    h+='<option value="'+esc(STATE.accounts[a].id)+'">'+esc(STATE.accounts[a].l)+'</option>';
  }
  
  h+='</select></div>'+
    '<div class="fg"><label class="fl">Type</label><select id="tk"><option>Growth</option><option>Dividend</option><option>ETF</option></select></div>'+
    '<button class="b bp" onclick="addManualTrade()">+</button>'+
    '</div></div>';

    '</select>'+
    '<select onchange="UI.filterAcct=this.value;renderPortfolioTable()">'+

function getAccountLabel(id){
  for(var i=0;i<STATE.accounts.length;i++){
    if(STATE.accounts[i].id===id)return STATE.accounts[i].l;
  }
  return id;
}

function toggleTxns(sym,acctId){
  var key=sym+"_"+acctId;
  UI.expanded[key]=!UI.expanded[key];
  
  // Store both page and table scroll
  var pageScroll=window.pageYOffset||document.documentElement.scrollTop;
  var table=document.querySelector('.tw');
  var tableScroll=table?table.scrollTop:0;
  
  renderPortfolioTable();
  
  // Restore scrolls after DOM update
  requestAnimationFrame(function(){
    window.scrollTo(0,pageScroll);
    var tableAfter=document.querySelector('.tw');
    if(tableAfter)tableAfter.scrollTop=tableScroll;
  });
}

function sortTable(key){
  if(UI.sortKey===key){
    UI.sortDir=UI.sortDir==="asc"?"desc":"asc";
  }else{
    UI.sortKey=key;
    UI.sortDir="desc";
  }
  renderPortfolioTable();
}

function addManualTrade(){
  var sym=document.getElementById("ts").value.trim().toUpperCase();
  var curr=document.getElementById("tt").value;
  var cost=parseFloat(document.getElementById("tc2").value);
  var qty=parseFloat(document.getElementById("tn").value);
  var acct=document.getElementById("ta").value;
  var kind=document.getElementById("tk").value;
  
  if(!sym||!cost||!qty||!acct){
    toast("Fill all fields");
    return;
  }
  
  // Find or create holding
  var found=false;
  for(var i=0;i<STATE.holdings.length;i++){
    if(STATE.holdings[i].s===sym && STATE.holdings[i].a===acct){
      var totalShares=STATE.holdings[i].n+qty;
      var totalCost=(STATE.holdings[i].c*STATE.holdings[i].n)+(cost*qty);
      STATE.holdings[i].n=totalShares;
      STATE.holdings[i].c=totalCost/totalShares;
      STATE.holdings[i].p=cost;
      found=true;
      break;
    }
  }
  
  if(!found){
    STATE.holdings.push({
      s:sym,
      t:curr,
      c:cost,
      n:qty,
      p:cost,
      a:acct,
      k:kind
    });
  }
  
  // Add transaction
  addTransaction(sym,"Buy",qty,cost,acct,"portfolio","",curr==="U"?"USD":"CAD");
  
  // Clear form
  document.getElementById("ts").value="";
  document.getElementById("tc2").value="";
  document.getElementById("tn").value="";
  
  save();
  toast("Added "+sym);
  recalc();
}

function saveEdit(idx){
  var sym=document.getElementById("es").value.trim().toUpperCase();
  var curr=document.getElementById("et").value;
  var cost=parseFloat(document.getElementById("ec").value);
  var qty=parseFloat(document.getElementById("en").value);
  var price=parseFloat(document.getElementById("ep").value);
  var acct=document.getElementById("ea").value;
  var kind=document.getElementById("ek").value;
  
  if(!sym||!cost||!qty){
    toast("Invalid values");
    return;
  }
  
  STATE.holdings[idx].s=sym;

  STATE.holdings[idx].c=cost;

function saveAcctEdit(idx){
  var label=document.getElementById("eal").value.trim();

  var cad=parseFloat(document.getElementById("eac").value)||0;
  var usd=parseFloat(document.getElementById("eau").value)||0;
  
  if(!label)return;
  
  STATE.accounts[idx].l=label;
  STATE.accounts[idx].tp=type;
  STATE.accounts[idx].cc=cad;
  STATE.accounts[idx].cu=usd;
  
  UI.editIdx=-1;
  save();
  recalc();

function deleteAcct(idx){
  if(!confirm("Delete account?"))return;
  
  STATE.auditLog.push({
    id:uid(),
    date:new Date().toISOString(),
    type:"account",
    data:JSON.parse(JSON.stringify(STATE.accounts[idx]))
  });
  
  STATE.accounts.splice(idx,1);
  save();
  recalc();
}

// AUDIT
window.renderFunctions.audit=function(){
  if(STATE.auditLog.length===0){
    document.getElementById("t-audit").innerHTML='<div class="c" style="text-align:center;padding:30px;color:var(--mt)">'+
      '<div style="font-size:24px;margin-bottom:8px">📜</div>'+
      '<div>No audit history</div>'+
      '</div>';
    return;
  }
  
  var h='<div class="c"><div class="lb">Audit Log ('+STATE.auditLog.length+')</div>';
  
  for(var i=STATE.auditLog.length-1;i>=0;i--){
    var a=STATE.auditLog[i];
    var desc="Unknown";
    
    if(a.type==="holding")desc="Holding deleted: "+a.data.s;
    else if(a.type==="resp_holding")desc="RESP holding deleted: "+a.data.s;
    else if(a.type==="account")desc="Account deleted: "+a.data.l;
    else if(a.type==="other_inv")desc="Investment deleted: "+a.data.n;
    else if(a.type==="budget")desc="Budget item deleted: "+a.data.name;
    else if(a.type==="txn")desc="Transaction deleted: "+a.data.sym+" "+a.data.action;
    else if(a.type==="rejected_trade")desc="Trade rejected: "+a.data.symbol;
    
    h+='<div class="sr">'+
      '<div>'+
      '<span style="font-size:11px;font-weight:600">'+esc(desc)+'</span>'+
      '<div class="sl">'+new Date(a.date).toLocaleString()+'</div>'+
      '</div>'+
      '<button class="b bp bs" onclick="restoreAudit('+i+')">↺ Restore</button>'+
      '</div>';
  }
  
  h+='</div>';
  
  document.getElementById("t-audit").innerHTML=h;
};

function restoreAudit(idx){
  var a=STATE.auditLog[idx];
  
  if(a.type==="holding"){
    STATE.holdings.push(a.data);
    toast("Restored "+a.data.s);
  }else if(a.type==="resp_holding"){
    STATE.resp.push(a.data);
    toast("Restored "+a.data.s);
  }else if(a.type==="account"){
    STATE.accounts.push(a.data);
    toast("Restored "+a.data.l);
  }else if(a.type==="other_inv"){
    STATE.other.push(a.data);
    toast("Restored "+a.data.n);
  }else if(a.type==="budget"){
    STATE.budget.items[a.data.name]=a.data.amt;
    toast("Restored "+a.data.name);
  }else if(a.type==="txn"){
    STATE.txnLog.push(a.data);
    toast("Restored transaction");
  }else{
    toast("Restored");
  }
  
  STATE.auditLog.splice(idx,1);
  save();
  recalc();
}

function connectGist(){
  CONFIG.ghToken=document.getElementById("ght").value.trim();
  SJ("ghToken",CONFIG.ghToken);
  
  var gid=document.getElementById("gid").value.trim();
  if(gid){
    CONFIG.gistId=gid;
    SJ("gistId",CONFIG.gistId);
    pullGist();
  }else{
    syncToGist().then(function(){
      toast("Connected! Gist ID: "+CONFIG.gistId);
      window.renderFunctions.settings();
    });
  }
}

function pullGist(){
  pullFromGist().then(function(ok){
    if(ok){
      toast("Synced from Gist!");
      setTimeout(function(){location.reload()},500);
    }else{
      toast("Pull failed");
    }
  });
}

function saveGmailCID(){
  CONFIG.gmailClientId=document.getElementById("gcid").value.trim();
  SJ("gmailCid",CONFIG.gmailClientId);
  gmailAuth();
}

function saveAVKey(){

function clearPriceCache(){
  var count=Object.keys(STATE.priceCache).length;
  STATE.priceCache={};
  save();
  toast("Cleared "+count+" cached price"+(count!==1?"s":""));

}

function manualFXRefresh(){

      toast("FX updated: "+STATE.fxRate.toFixed(4));
      window.renderFunctions.settings();
      recalc();
    }else{
      toast("FX update failed");
    }
  });
}

function exportJSON(){
  var blob=new Blob([JSON.stringify(getAllData(),null,2)],{type:"application/json"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="finance_v2_"+new Date().toISOString().split("T")[0]+".json";
  a.click();
  toast("Exported");
}

function importJSON(){
  var inp=document.createElement("input");
  inp.type="file";
  inp.accept=".json";
  inp.onchange=function(e){
    var reader=new FileReader();
    reader.onload=function(ev){
      try{
        console.log("📥 Importing JSON...");
        var data=JSON.parse(ev.target.result);
        console.log("📋 Parsed data keys:",Object.keys(data));
        
        // Apply without auto-save, then save manually
        applyData(data,true);
        
        // Force immediate save to localStorage
        console.log("💾 Saving to localStorage...");
        SJ("holdings",STATE.holdings);
        SJ("resp",STATE.resp);
        SJ("accounts",STATE.accounts);
        SJ("other",STATE.other);
        SJ("budget",STATE.budget);
        SJ("txnLog",STATE.txnLog);
        SJ("pendingTrades",STATE.pendingTrades);
        SJ("auditLog",STATE.auditLog);
        SJ("priceCache",STATE.priceCache);
        SJ("fxRate",STATE.fxRate);
        SJ("fxLastUpdate",STATE.fxLastUpdate);
        SJ("dividends",STATE.dividends);
        
        console.log("✅ Data saved! Counts - Holdings:",STATE.holdings.length,"Accounts:",STATE.accounts.length);
        
        toast("Imported! Reloading in 2s...");
        
        // Longer delay to ensure save completes
        setTimeout(function(){
          console.log("🔄 Reloading page...");
          location.reload();
        },2000);
        
      }catch(ex){
        console.error("❌ Import failed:",ex);
        toast("Invalid JSON: "+ex.message);
      }
    };
    reader.readAsText(e.target.files[0]);
  };
  inp.click();
}

function exportCSV(){
  var csv="Symbol,Currency,AvgCost,Shares,Price,Account,Type\n";
  for(var i=0;i<STATE.holdings.length;i++){
    var h=STATE.holdings[i];
    csv+=h.s+","+(h.t==="U"?"USD":"CAD")+","+h.c+","+h.n+","+(h.p||h.c)+","+h.a+","+h.k+"\n";
  }
  var blob=new Blob([csv],{type:"text/csv"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="portfolio_v2.csv";
  a.click();
  toast("Exported");
}

function testLocalStorage(){
  try{
    console.log("🧪 Testing localStorage...");
    
    // Test write
    localStorage.setItem("fc2_test","test_value");
    
    // Test read
    var val=localStorage.getItem("fc2_test");
    
    if(val==="test_value"){
      console.log("✅ localStorage working!");
      
      // Check current data
      var holdings=localStorage.getItem("fc2_holdings");
      var accounts=localStorage.getItem("fc2_accounts");
      
      console.log("📊 Stored data:");
      console.log("- Holdings:",holdings?JSON.parse(holdings).length:"none");
      console.log("- Accounts:",accounts?JSON.parse(accounts).length:"none");
      
      toast("localStorage working! Check console for details");
    }else{
      console.error("❌ localStorage test failed - read mismatch");
      toast("localStorage test FAILED");
    }
    
    // Cleanup
    localStorage.removeItem("fc2_test");
    
  }catch(e){
    console.error("❌ localStorage error:",e);
    toast("localStorage ERROR: "+e.message);
  }
}

function resetAll(){
  if(!confirm("Reset ALL data? This cannot be undone!"))return;
  if(!confirm("Are you absolutely sure?"))return;
  localStorage.clear();
  location.reload();
}
